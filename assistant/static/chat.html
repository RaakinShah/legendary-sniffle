<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* Aide: floating Siri-style glass — pill / compact panel / full sidebar app.
     The window itself is transparent; everything visible is drawn here. */
  :root {
    color-scheme: light dark;
    --glass: rgba(244, 244, 248, 0.97);
    --side: rgba(238, 238, 243, 0.78);
    --glass-border: rgba(0, 0, 0, 0.06);
    --hairline: rgba(0, 0, 0, 0.08);
    --sheen: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0) 42%);
    --shadow: 0 0 0 0.5px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.08),
              0 14px 36px rgba(0,0,0,0.16), 0 40px 100px rgba(0,0,0,0.20);
    --inset-hi: inset 0 1px 0 rgba(255,255,255,0.85);
    --text: #1d1d1f;
    --dim: rgba(60, 60, 67, 0.58);
    --faint: rgba(60, 60, 67, 0.40);
    --fill: rgba(120, 120, 128, 0.12);
    --fill-hover: rgba(120, 120, 128, 0.22);
    --sel: rgba(10, 132, 255, 0.14);
    --code-bg: rgba(0, 0, 0, 0.05);
    --btn-grad: linear-gradient(180deg, #3c3c41, #1d1d1f);
    --btn-fg: #fff;
    --link: #0a6dd6;
    --accent: #0a84ff;
    --orb: conic-gradient(from 200deg, #ff5fa2, #ffb45f, #5fd4ff, #a05fff, #ff5fa2);
    --spring: cubic-bezier(.34, 1.35, .42, 1);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --glass: rgba(28, 28, 31, 0.95);
      --side: rgba(22, 22, 25, 0.66);
      --glass-border: rgba(255, 255, 255, 0.13);
      --hairline: rgba(255, 255, 255, 0.10);
      --sheen: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0) 42%);
      --shadow: 0 0 0 0.5px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.35),
                0 16px 40px rgba(0,0,0,0.45), 0 44px 110px rgba(0,0,0,0.55);
      --inset-hi: inset 0 1px 0 rgba(255,255,255,0.12);
      --text: #f5f5f7;
      --dim: rgba(235, 235, 245, 0.55);
      --faint: rgba(235, 235, 245, 0.38);
      --fill: rgba(120, 120, 128, 0.26);
      --fill-hover: rgba(120, 120, 128, 0.40);
      --sel: rgba(10, 132, 255, 0.30);
      --code-bg: rgba(255, 255, 255, 0.08);
      --btn-grad: linear-gradient(180deg, #fff, #dcdce2);
      --btn-fg: #111;
      --link: #6cb2ff;
    }
  }
  * { box-sizing: border-box; -webkit-user-select: none; }
  html, body { height: 100%; background: transparent; }
  body {
    margin: 0; padding: 16px; overflow: hidden;
    font: 14.5px/1.55 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    letter-spacing: .01em; color: var(--text); -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--sel); }
  .glass {
    background: var(--sheen), var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(50px) saturate(1.6); -webkit-backdrop-filter: blur(50px) saturate(1.6);
    box-shadow: var(--shadow), var(--inset-hi);
  }
  .orb {
    position: relative; width: 24px; height: 24px; border-radius: 50%; flex: none;
    background: radial-gradient(circle at 32% 28%, rgba(255,255,255,.95), rgba(255,255,255,0) 40%), var(--orb);
    animation: orb 7s linear infinite, glow 4.5s ease-in-out infinite;
  }
  .orb.sm { width: 18px; height: 18px; }
  @keyframes orb { to { transform: rotate(360deg); } }
  @keyframes glow {
    0%,100% { box-shadow: 0 0 10px rgba(150,140,255,.45), 0 0 26px rgba(90,160,255,.22); }
    50% { box-shadow: 0 0 16px rgba(150,140,255,.75), 0 0 40px rgba(90,160,255,.40); }
  }
  .orbWrap { flex: none; animation: float 5.5s ease-in-out infinite; }
  @keyframes float { 50% { transform: translateY(-2.5px); } }
  .orbWrap.pop { animation: float 5.5s ease-in-out infinite, pop .55s var(--spring); }
  @keyframes pop { 40% { transform: scale(1.4); } }
  .busy .orb { animation-duration: 1.4s, 1.4s; }

  /* ===== PILL ===== */
  #pillView {
    display: flex; align-items: center; gap: 12px; height: 100%;
    padding: 0 10px 0 18px; border-radius: 999px; animation: appear .45s var(--spring) both;
  }
  @keyframes appear { from { opacity: 0; transform: scale(.93) translateY(-12px); } }
  #pillInput {
    flex: 1; border: none; outline: none; background: transparent; color: var(--text);
    font: 17px -apple-system, BlinkMacSystemFont, sans-serif; -webkit-user-select: text;
  }
  #pillInput::placeholder { color: var(--dim); }

  .iconBtn {
    flex: none; width: 36px; height: 36px; border: none; border-radius: 50%;
    background: transparent; color: var(--dim); cursor: pointer; display: grid; place-items: center;
    transition: transform .18s var(--spring), color .2s, background .2s;
  }
  .iconBtn:hover { color: var(--text); background: var(--fill); transform: scale(1.08); }
  .iconBtn:active { transform: scale(.85); }
  .iconBtn svg { width: 17px; height: 17px; }

  /* ===== APP CONTAINER (panel + sidebar app) ===== */
  #appView { display: none; height: 100%; border-radius: 28px; overflow: hidden; }
  #appView.open { display: flex; animation: appear .4s var(--spring) both; }

  #sidebar {
    display: none; flex-direction: column; width: 250px; flex: none; height: 100%;
    padding: 14px 10px 10px; background: var(--side);
    border-right: 1px solid var(--hairline);
  }
  #appView.app #sidebar { display: flex; animation: fadeR .4s var(--spring) both; }
  @keyframes fadeR { from { opacity: 0; transform: translateX(-10px); } }
  .brand { display: flex; align-items: center; gap: 9px; padding: 6px 8px 14px; font-weight: 650; font-size: 16px; }
  .navItem {
    display: flex; align-items: center; gap: 10px; width: 100%; border: none; cursor: pointer;
    padding: 8px 10px; border-radius: 9px; background: transparent; color: var(--text);
    font: 13.5px -apple-system, sans-serif; text-align: left;
    transition: background .15s; margin-bottom: 1px;
  }
  .navItem:hover { background: var(--fill); }
  .navItem.active { background: var(--fill-hover); }
  .navItem svg { width: 15px; height: 15px; flex: none; opacity: .75; }
  .navItem .badge { margin-left: auto; font-size: 10px; font-weight: 600; color: var(--accent);
    background: rgba(10,132,255,.14); padding: 1px 6px; border-radius: 6px; }
  #searchBox { display: none; margin: 2px 2px 6px; }
  #searchBox.show { display: block; animation: fadeDown .25s ease both; }
  #searchBox input {
    width: 100%; border: 1px solid var(--glass-border); outline: none; border-radius: 9px;
    padding: 7px 11px; font: 13px inherit; color: var(--text); background: var(--fill);
  }
  .sideHdr { font-size: 11px; font-weight: 600; color: var(--faint); text-transform: uppercase;
    letter-spacing: .04em; padding: 12px 10px 4px; }
  .convList { overflow-y: auto; }
  .convList::-webkit-scrollbar { width: 7px; }
  .convList::-webkit-scrollbar-thumb { background: var(--fill-hover); border-radius: 4px;
    border: 2px solid transparent; background-clip: padding-box; }
  #recents { flex: 1; }
  .conv {
    display: flex; align-items: center; gap: 6px; padding: 7px 10px; border-radius: 8px;
    cursor: pointer; font-size: 13px; color: var(--text); transition: background .15s;
  }
  .conv:hover { background: var(--fill); }
  .conv.active { background: var(--fill-hover); }
  .conv .t { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conv .star { opacity: 0; color: var(--faint); font-size: 13px; transition: opacity .15s, color .15s; }
  .conv:hover .star { opacity: .6; }
  .conv .star.on { opacity: 1; color: #ffb000; }
  .sideFoot { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--hairline); }
  #ctxPill {
    display: flex; align-items: center; gap: 8px; width: 100%; border: 1px solid var(--glass-border);
    cursor: pointer; padding: 7px 11px; border-radius: 10px; background: var(--fill); color: var(--dim);
    font: 12.5px inherit; margin-bottom: 8px; transition: background .15s;
  }
  #ctxPill:hover { background: var(--fill-hover); }
  #ctxPill .dot { width: 7px; height: 7px; border-radius: 50%; background: #34c759; margin-left: auto; box-shadow: 0 0 6px #34c759; }
  #ctxPill.off { color: #ff9f0a; } #ctxPill.off .dot { background: #ff9f0a; box-shadow: none; }
  .user {
    display: flex; align-items: center; gap: 9px; padding: 6px 8px; font-size: 13px;
  }
  .user .av { width: 26px; height: 26px; border-radius: 50%; background: var(--btn-grad); color: var(--btn-fg);
    display: grid; place-items: center; font-weight: 600; font-size: 12px; }
  .user .sub { color: var(--faint); font-size: 11px; }

  /* ===== MAIN PANE ===== */
  #main { display: flex; flex-direction: column; flex: 1; min-width: 0; height: 100%; }
  #head { flex: none; display: flex; align-items: center; gap: 8px; padding: 13px 15px 8px;
    transition: box-shadow .25s; }
  #head.scrolled { box-shadow: 0 1px 0 var(--hairline); }
  #appView.open #head { animation: fadeDown .4s var(--spring) .04s both; }
  #appView.open #log { animation: fadeDown .4s var(--spring) .09s both; }
  #appView.open #bar { animation: fadeDown .4s var(--spring) .14s both; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-7px); } }
  #head .spacer { flex: 1; }
  #head .ctl { width: 30px; height: 30px; border: none; border-radius: 50%; background: var(--fill);
    color: var(--dim); cursor: pointer; display: grid; place-items: center;
    transition: transform .18s var(--spring), background .2s, color .2s; }
  #head .ctl:hover { background: var(--fill-hover); color: var(--text); transform: scale(1.07); }
  #head .ctl:active { transform: scale(.85); }
  #head .ctl svg { width: 12px; height: 12px; }
  .app-only { display: none; }
  #appView.app .app-only { display: grid; }
  #appView.app #headOrb { display: none; }

  #log { flex: 1; overflow-y: auto; padding: 8px 22px 14px;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 14px, #000 calc(100% - 10px), transparent 100%); }
  #log::-webkit-scrollbar { width: 7px; }
  #log::-webkit-scrollbar-thumb { background: var(--fill-hover); border-radius: 4px;
    border: 2px solid transparent; background-clip: padding-box; }
  #log.center { display: flex; flex-direction: column; justify-content: center; align-items: center; }
  #log.center > * { width: auto; }
  .hero { display: none; font-size: 25px; font-weight: 600; text-align: center; margin: 0 0 22px;
    letter-spacing: -.01em; animation: rise .5s var(--spring) both; }
  #appView.app #log.center .hero { display: block; }

  .row { display: flex; margin: 7px 0; animation: rise .5s var(--spring) both; }
  .row.u { justify-content: flex-end; }
  @keyframes rise { from { opacity: 0; transform: translateY(16px) scale(.96); } }
  .u .msg { max-width: min(78%, 520px); padding: 9px 15px; border-radius: 19px; border-bottom-right-radius: 6px;
    background: linear-gradient(180deg, var(--fill-hover), var(--fill)); border: 1px solid var(--glass-border);
    box-shadow: 0 1px 3px rgba(0,0,0,.10); white-space: pre-wrap; word-wrap: break-word; -webkit-user-select: text; }
  .b .msg { max-width: min(95%, 640px); padding: 4px 2px; font-size: 15px; line-height: 1.6;
    word-wrap: break-word; -webkit-user-select: text; }
  .b .msg p { margin: .45em 0; } .b .msg p:first-child { margin-top: 0; } .b .msg p:last-child { margin-bottom: 0; }
  .b .msg h1,.b .msg h2,.b .msg h3 { margin: .65em 0 .25em; font-size: 1.03em; font-weight: 650; }
  .b .msg ul,.b .msg ol { margin: .3em 0; padding-left: 1.3em; } .b .msg li { margin: .14em 0; }
  .b .msg a { color: var(--link); text-decoration: none; } .b .msg a:hover { text-decoration: underline; }
  .b .msg code { font: 12.5px ui-monospace, "SF Mono", Menlo, monospace; background: var(--code-bg); padding: 1.5px 5px; border-radius: 5px; }
  .b .msg pre { background: var(--code-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 10px 12px; overflow-x: auto; margin: .5em 0; }
  .b .msg pre code { background: none; padding: 0; }
  .draft { opacity: .92; }
  .draft::after { content: ''; display: inline-block; width: 7px; height: 14px; margin-left: 2px; vertical-align: -2px;
    border-radius: 2px; background: var(--dim); animation: caret 1s steps(2) infinite; }
  @keyframes caret { 50% { opacity: 0; } }
  .row.b { position: relative; }
  .copyBtn { position: absolute; top: 2px; right: 0; width: 26px; height: 26px; border: none; border-radius: 8px;
    cursor: pointer; background: var(--fill); color: var(--dim); display: grid; place-items: center; opacity: 0;
    transition: opacity .2s, background .2s, color .2s; }
  .row.b:hover .copyBtn { opacity: 1; } .copyBtn:hover { background: var(--fill-hover); color: var(--text); }
  .copyBtn svg { width: 12px; height: 12px; }

  #chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 6px 0 10px; justify-content: center; animation: rise .5s var(--spring) both; }
  .chip { cursor: pointer; padding: 8px 15px; border-radius: 999px; font: 13px -apple-system, sans-serif; font-weight: 500;
    color: var(--text); background: linear-gradient(180deg, var(--fill-hover), var(--fill)); border: 1px solid var(--glass-border);
    box-shadow: 0 1px 2px rgba(0,0,0,.08); transition: transform .18s var(--spring), box-shadow .2s, background .2s; }
  .chip:hover { background: var(--fill-hover); transform: translateY(-1px) scale(1.04); box-shadow: 0 4px 12px rgba(0,0,0,.16); }
  .chip:active { transform: scale(.93); }

  .tool { display: inline-flex; align-items: center; gap: 6px; width: fit-content; align-self: flex-start;
    margin: 4px 0; padding: 3.5px 11px; font-size: 11.5px; font-weight: 500; color: var(--dim);
    background: var(--fill); border-radius: 999px; animation: slideIn .42s var(--spring) both; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-14px); } }
  .tool .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: .35; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.15); } }
  .typing { display: inline-flex; gap: 5px; padding: 10px 2px; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); animation: blink 1.3s ease-in-out infinite; }
  .typing span:nth-child(2) { animation-delay: .18s; } .typing span:nth-child(3) { animation-delay: .36s; }
  @keyframes blink { 0%,70%,100% { opacity: .25; transform: translateY(0); } 35% { opacity: 1; transform: translateY(-3.5px); } }
  .err { width: fit-content; margin: 6px auto; padding: 4px 12px; font-size: 11.5px; color: #ff453a;
    background: rgba(255,69,58,.12); border: 1px solid rgba(255,69,58,.25); border-radius: 999px; animation: rise .38s var(--spring) both; }

  #bar { flex: none; display: flex; align-items: flex-end; gap: 9px; padding: 8px 15px 15px; }
  #appView.app #bar { padding: 8px 22px 18px; }
  #screenBtn2 { background: var(--fill); color: var(--dim); width: 38px; height: 38px; }
  #inPill { flex: 1; display: flex; align-items: flex-end; gap: 6px; padding: 6px 6px 6px 15px; border-radius: 22px;
    background: var(--fill); border: 1px solid transparent; transition: border-color .25s, background .25s, box-shadow .25s; }
  #inPill:focus-within { background: var(--fill-hover); box-shadow: 0 0 0 3px rgba(10,132,255,.15); border-color: rgba(10,132,255,.35); }
  #input { flex: 1; border: none; outline: none; resize: none; font: inherit; color: inherit; background: transparent;
    max-height: 130px; padding: 4px 0; -webkit-user-select: text; }
  #input::placeholder { color: var(--dim); }
  #sendBtn { flex: none; width: 30px; height: 30px; border: none; border-radius: 50%; background: var(--btn-grad);
    color: var(--btn-fg); cursor: pointer; display: grid; place-items: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.25);
    transition: transform .18s var(--spring), opacity .2s, box-shadow .2s; }
  #sendBtn:hover { transform: scale(1.08); }
  #sendBtn:active { transform: scale(.86); }
  #sendBtn.ready { transform: scale(1.1); box-shadow: 0 0 0 3px rgba(10,132,255,.25), 0 3px 10px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.25); }
  #sendBtn:disabled { opacity: .3; transform: none; cursor: default; }
  #sendBtn svg { width: 13px; height: 13px; }
  #sendBtn.fly svg { animation: fly .38s var(--spring); }
  @keyframes fly { 35% { transform: translateY(-16px); opacity: 0; } 36% { transform: translateY(14px); opacity: 0; } 100% { transform: none; opacity: 1; } }
</style>
</head>
<body>
  <!-- summon pill -->
  <div id="pillView" class="glass">
    <div class="orbWrap" title="Aide"><div class="orb"></div></div>
    <input id="pillInput" placeholder="Ask Aide" autofocus>
    <button class="iconBtn screenBtn" title="Ask about what's on your screen">
      <svg viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2.5" width="13" height="9" rx="1.8" stroke="currentColor" stroke-width="1.6"/><path d="M5.5 14h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- panel / sidebar app -->
  <div id="appView" class="glass">
    <div id="sidebar">
      <div class="brand"><div class="orb sm"></div>Aide</div>
      <button class="navItem active" id="navNew">
        <svg viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>New Chat</button>
      <button class="navItem" id="navSearch">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.6"/><path d="M11 11l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>Search</button>
      <div id="searchBox"><input id="searchInput" placeholder="Search conversations…"></div>
      <button class="navItem" id="navRoutines">
        <svg viewBox="0 0 16 16" fill="none"><path d="M13 8a5 5 0 1 1-1.5-3.5M13 2v3h-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Routines</button>
      <div class="sideHdr" id="favHdr" style="display:none">Favorites</div>
      <div class="convList" id="favorites"></div>
      <div class="sideHdr">Recents</div>
      <div class="convList" id="recents"></div>
      <div class="sideFoot">
        <button id="ctxPill"><span>Context active</span><span class="dot"></span></button>
        <div class="user"><div class="av" id="userAv">A</div><div><div id="userName">You</div><div class="sub">Aide · local</div></div></div>
      </div>
    </div>
    <div id="main">
      <div id="head">
        <button class="ctl" id="closeBtn" title="Collapse (Esc)">
          <svg viewBox="0 0 12 12" fill="none"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
        <div class="spacer"></div>
        <div class="orbWrap" id="headOrb"><div class="orb"></div></div>
        <div class="spacer"></div>
        <button class="ctl app-only" id="recallBtn" title="Pause ambient memory" style="display:none">
          <svg viewBox="0 0 14 14" fill="none"><path d="M1.5 7s2-3.5 5.5-3.5S12.5 7 12.5 7s-2 3.5-5.5 3.5S1.5 7 1.5 7Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><circle cx="7" cy="7" r="1.6" stroke="currentColor" stroke-width="1.4"/><path class="slash" d="M2.5 12L11.5 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" style="display:none"/></svg></button>
        <button class="ctl" id="newBtn" title="New conversation">
          <svg viewBox="0 0 12 12" fill="none"><path d="M6 1.5v9M1.5 6h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button class="ctl" id="expandBtn" title="Open sidebar">
          <svg viewBox="0 0 13 13" fill="none"><rect x="1" y="1.5" width="11" height="10" rx="2.2" stroke="currentColor" stroke-width="1.5"/><path d="M4.8 1.5v10" stroke="currentColor" stroke-width="1.5"/></svg></button>
      </div>
      <div id="log"></div>
      <div id="bar">
        <button class="iconBtn screenBtn" id="screenBtn2" title="Ask about what's on your screen">
          <svg viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2.5" width="13" height="9" rx="1.8" stroke="currentColor" stroke-width="1.6"/><path d="M5.5 14h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
        <div id="inPill">
          <textarea id="input" rows="1" placeholder="Ask Aide"></textarea>
          <button id="sendBtn" title="Send"><svg viewBox="0 0 16 16" fill="none"><path d="M8 13V3M8 3L3.5 7.5M8 3l4.5 4.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </div>
      </div>
    </div>
  </div>

<script>
  const SIZES = { pill: [660, 96], panel: [660, 580], app: [1000, 700] };
  const IDLE_COLLAPSE_MS = 75000;
  let state = 'pill', idleTimer = null;
  let botEl = null, botRaw = '', busy = false, draftEl = null, draftText = '';

  const $ = id => document.getElementById(id);
  const log = $('log'), input = $('input'), pillInput = $('pillInput'), btn = $('sendBtn'), appView = $('appView');

  document.addEventListener('mousedown', e => {
    if (e.target.closest('input, textarea, button, a, .msg, pre, .chip, .conv, #sidebar')) e.stopPropagation();
  }, true);

  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  function md(src) {
    const blocks = [];
    src = src.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, code) =>
      `\x00${blocks.push(`<pre><code>${esc(code.replace(/\n$/,''))}</code></pre>`) - 1}\x00`);
    let h = esc(src)
      .replace(/`([^`\n]+)`/g, '<code>$1</code>').replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
      .replace(/(^|\s)\*([^*\n]+)\*/g, '$1<i>$2</i>')
      .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2">$1</a>')
      .replace(/^###?#?\s+(.+)$/gm, '<h3>$1</h3>')
      .replace(/^(?:[-*]\s+.+\n?)+/gm, m => `<ul>${m.trim().split('\n').map(l=>`<li>${l.replace(/^[-*]\s+/,'')}</li>`).join('')}</ul>`)
      .replace(/^(?:\d+\.\s+.+\n?)+/gm, m => `<ol>${m.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\.\s+/,'')}</li>`).join('')}</ol>`);
    h = h.split(/\n{2,}/).map(p => /^<(h3|ul|ol|pre)/.test(p.trim()) ? p : `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
    return h.replace(/\x00(\d+)\x00/g, (_, i) => blocks[i]);
  }

  function armIdle() {
    clearTimeout(idleTimer);
    if (state !== 'panel') return;   // only the compact panel auto-collapses
    idleTimer = setTimeout(() => { if (!busy && !input.value.trim()) setState('pill'); else armIdle(); }, IDLE_COLLAPSE_MS);
  }
  ['keydown','mousedown','mousemove','wheel'].forEach(ev => document.addEventListener(ev, armIdle, { passive: true }));

  function setState(s) {
    state = s;
    const [w, h] = SIZES[s] || SIZES.panel;
    try { pywebview.api.resize(w, h); } catch (e) {}
    $('pillView').style.display = s === 'pill' ? 'flex' : 'none';
    appView.classList.toggle('open', s !== 'pill');
    appView.classList.toggle('app', s === 'app');
    $('expandBtn').title = s === 'app' ? 'Compact view' : 'Open sidebar';
    if (s === 'app') refreshLists();
    updateCenter();
    (s === 'pill' ? pillInput : input).focus();
    armIdle();
  }

  function scrollDown() { updateCenter(); log.scrollTo({ top: log.scrollHeight, behavior: 'smooth' }); }
  function updateCenter() {
    const rows = log.querySelectorAll('.row:not(.typing-row)').length;
    const content = Array.from(log.children).reduce((a, c) => a + c.offsetHeight, 0);
    log.classList.toggle('center', !log.querySelector('.row.u') && rows <= 1 && content <= log.clientHeight * 0.6);
  }
  function addRow(cls, inner) { const r = document.createElement('div'); r.className = 'row ' + cls; r.appendChild(inner); log.appendChild(r); scrollDown(); return inner; }
  function bubble(cls, text) { const e = document.createElement('div'); e.className = 'msg'; if (text !== undefined) e.textContent = text; return addRow(cls, e); }
  function clearTyping() { document.querySelectorAll('.typing-row').forEach(e => e.remove()); }
  function showTyping() { clearTyping(); const t = document.createElement('div'); t.className = 'msg typing'; t.innerHTML = '<span></span><span></span><span></span>'; addRow('b typing-row', t); }
  function setBusy(b) { busy = b; btn.disabled = b; document.body.classList.toggle('busy', b); if (b) showTyping(); else clearTyping(); }

  const TOOL_NAMES = {
    Bash:'Running a command', Read:'Reading a file', Write:'Writing a file', Edit:'Editing a file',
    Glob:'Finding files', Grep:'Searching files', WebSearch:'Searching the web', WebFetch:'Reading a webpage',
    TodoWrite:'Planning', capture_screen:'Looking at your screen', add_task:'Adding a task',
    list_tasks:'Checking your tasks', due_tasks:'Checking what’s due', complete_task:'Completing a task',
    remember:'Saving to memory', journal:'Updating journal', recall_timeline:'Checking your activity',
    recall_screenshot:'Looking back in time', recall_search:'Searching your screen memory',
    recall_pause:'Pausing ambient memory', recall_forget:'Forgetting',
  };
  const toolLabel = n => TOOL_NAMES[n] || n.replace(/_/g,' ').replace(/([a-z])([A-Z])/g,'$1 $2');

  const COPY_SVG = '<svg viewBox="0 0 12 12" fill="none"><rect x="3.5" y="3.5" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M8.5 3.5V2.3A1.3 1.3 0 0 0 7.2 1H2.3A1.3 1.3 0 0 0 1 2.3v4.9a1.3 1.3 0 0 0 1.3 1.3h1.2" stroke="currentColor" stroke-width="1.4"/></svg>';
  function ensureBot() {
    if (!botEl) {
      botEl = bubble('b'); botRaw = '';
      const c = document.createElement('button'); c.className = 'copyBtn'; c.title = 'Copy'; c.innerHTML = COPY_SVG;
      const el = botEl; c.onclick = () => navigator.clipboard && navigator.clipboard.writeText(el._raw || el.textContent);
      botEl.parentElement.appendChild(c);
    }
    return botEl;
  }
  function clearDraft() { if (draftEl) draftEl.remove(); draftEl = null; draftText = ''; }
  function heroEl() { const h = document.createElement('div'); h.className = 'hero'; h.textContent = "What's on your mind today?"; return h; }
  function showChips() {
    const wrap = document.createElement('div'); wrap.id = 'chips';
    log.appendChild(heroEl());   // CSS shows it only in app mode + centered
    [['What’s on my screen','__SCREEN__'],['Plan my day','Plan my day: check my tasks and calendar and lay out a plan.'],
     ['What’s due','What tasks are due or overdue?'],['Check my email','Check my recent email and summarize anything that needs my attention.']]
    .forEach(([label, prompt], i) => {
      const b = document.createElement('button'); b.className = 'chip'; b.textContent = label;
      b.style.animation = `rise .45s var(--spring) ${.1 + i*.06}s both`;
      b.onclick = () => prompt === '__SCREEN__' ? askScreen() : submit(prompt);
      wrap.appendChild(b);
    });
    log.appendChild(wrap); updateCenter();
  }

  // ----- streamed output from Python -----
  window.streamText = t => {
    if (state === 'pill') setState('panel');
    clearTyping(); const el = ensureBot();
    if (!draftEl) { draftEl = document.createElement('div'); draftEl.className = 'draft'; el.appendChild(draftEl); }
    draftText += t; draftEl.textContent = draftText; scrollDown();
  };
  window.appendText = t => {
    if (state === 'pill') setState('panel');
    clearTyping(); clearDraft(); const el = ensureBot();
    botRaw += (botRaw ? '\n\n' : '') + t; el.innerHTML = md(botRaw); el._raw = botRaw;
    el.parentElement.querySelector('.copyBtn') || ensureBot();
    scrollDown(); showTyping();
  };
  window.appendTool = name => {
    if (state === 'pill') setState('panel');
    clearTyping(); clearDraft();
    const chip = document.createElement('div'); chip.className = 'tool';
    chip.innerHTML = `<span class="pulse"></span>${esc(toolLabel(name.replace(/^mcp__\w+__/,'')))}`;
    log.appendChild(chip); scrollDown(); showTyping();
  };
  window.done = err => {
    clearTyping(); clearDraft();
    if (err) { const e = document.createElement('div'); e.className = 'err'; e.textContent = 'stopped: ' + err; log.appendChild(e); scrollDown(); }
    document.querySelectorAll('.tool .pulse').forEach(p => p.remove());
    botEl = null; botRaw = ''; busy = false; btn.disabled = false; document.body.classList.remove('busy');
    document.querySelectorAll('.orbWrap').forEach(o => { o.classList.remove('pop'); void o.offsetWidth; o.classList.add('pop'); setTimeout(() => o.classList.remove('pop'), 600); });
    refreshLists();
    if (state !== 'pill') input.focus();
    armIdle();
  };
  window.focusInput = () => (state === 'pill' ? pillInput : input).focus();
  window.summon = () => { const v = state === 'pill' ? $('pillView') : appView; v.style.animation = 'none'; void v.offsetWidth; v.style.animation = ''; focusInput(); };

  function submit(text) {
    if (!text || busy) return;
    if (state === 'pill') setState('panel');
    const chips = $('chips'); if (chips) chips.remove();
    document.querySelectorAll('.hero').forEach(h => h.remove());
    bubble('u', text); setBusy(true); pywebview.api.send(text);
  }
  function askScreen() {
    if (busy) return;
    if (state === 'pill') setState('panel');
    const chips = $('chips'); if (chips) chips.remove();
    document.querySelectorAll('.hero').forEach(h => h.remove());
    bubble('u', '👁 What’s on my screen?'); setBusy(true);
    pywebview.api.send('Capture my screen and help me with what I am currently looking at. If it is obvious what I need, just do it; otherwise give a tight summary and offer next steps.');
  }

  // ----- conversation history / sidebar -----
  function freshLog() { log.innerHTML = ''; botEl = null; botRaw = ''; clearDraft(); }
  function startNew() {
    freshLog(); try { pywebview.api.new_chat(); } catch (e) {}
    showChips(); refreshLists(); input.focus();
    document.querySelectorAll('.conv.active').forEach(c => c.classList.remove('active'));
  }
  async function openConv(id, el) {
    if (busy) return;
    let data; try { data = await pywebview.api.open_conversation(id); } catch (e) { return; }
    if (!data || !data.messages) return;
    freshLog();
    for (const m of data.messages) {
      if (m.role === 'user') bubble('u', m.text);
      else { const b = bubble('b'); b.innerHTML = md(m.text); b._raw = m.text;
             const c = document.createElement('button'); c.className = 'copyBtn'; c.innerHTML = COPY_SVG;
             c.onclick = () => navigator.clipboard && navigator.clipboard.writeText(m.text); b.parentElement.appendChild(c); }
    }
    botEl = null; updateCenter(); scrollDown(); input.focus();
    document.querySelectorAll('.conv.active').forEach(c => c.classList.remove('active'));
    if (el) el.classList.add('active');
  }
  function convRow(c) {
    const row = document.createElement('div'); row.className = 'conv'; row.dataset.id = c.id;
    const t = document.createElement('span'); t.className = 't'; t.textContent = c.title || 'New chat';
    const star = document.createElement('span'); star.className = 'star' + (c.favorite ? ' on' : ''); star.textContent = '★';
    star.onclick = e => { e.stopPropagation(); pywebview.api.favorite_conversation(c.id, !c.favorite).then(refreshLists); };
    row.append(t, star);
    row.onclick = () => openConv(c.id, row);
    return row;
  }
  function render(listEl, items) { listEl.innerHTML = ''; items.forEach(c => listEl.appendChild(convRow(c))); }
  async function refreshLists() {
    if (state !== 'app') return;
    try {
      const { recents, favorites } = await pywebview.api.list_conversations();
      $('favHdr').style.display = favorites.length ? 'block' : 'none';
      render($('favorites'), favorites); render($('recents'), recents);
    } catch (e) {}
  }

  // ----- wiring -----
  btn.onclick = () => { const t = input.value.trim(); if (t && !busy) { btn.classList.add('fly'); setTimeout(() => btn.classList.remove('fly'), 420); } input.value = ''; input.style.height = 'auto'; btn.classList.remove('ready'); submit(t); };
  document.querySelectorAll('.screenBtn').forEach(b => b.onclick = askScreen);
  $('closeBtn').onclick = () => setState(state === 'app' ? 'panel' : 'pill');
  $('expandBtn').onclick = () => setState(state === 'app' ? 'panel' : 'app');
  $('newBtn').onclick = startNew;
  $('navNew').onclick = startNew;
  $('navSearch').onclick = () => { const sb = $('searchBox'); sb.classList.toggle('show'); if (sb.classList.contains('show')) $('searchInput').focus(); };
  $('navRoutines').onclick = () => submit('Show me my latest briefing and evening digest if they exist; otherwise generate a quick plan for today.');
  $('searchInput').addEventListener('input', async e => {
    const q = e.target.value.trim();
    try { render($('recents'), await pywebview.api.search_conversations(q)); $('favHdr').style.display = 'none'; $('favorites').innerHTML = ''; } catch (err) {}
  });
  const recallBtns = () => [$('recallBtn'), $('ctxPill')].filter(Boolean);
  async function toggleRecall() {
    try {
      const off = await pywebview.api.toggle_recall();
      $('recallBtn').classList.toggle('off', off);
      const cp = $('ctxPill'); cp.classList.toggle('off', off); cp.firstChild.textContent = off ? 'Context paused' : 'Context active';
    } catch (e) {}
  }
  $('recallBtn').onclick = toggleRecall;
  $('ctxPill').onclick = toggleRecall;

  pillInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); const t = pillInput.value.trim(); pillInput.value = ''; submit(t); } });
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); btn.onclick(); } });
  input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = input.scrollHeight + 'px'; btn.classList.toggle('ready', !!input.value.trim() && !busy); });
  document.addEventListener('keydown', e => { if (e.key !== 'Escape') return; if (state === 'app') setState('panel'); else if (state === 'panel') setState('pill'); else try { pywebview.api.hide_window(); } catch (err) {} });

  window.addEventListener('pywebviewready', () => { showChips(); setBusy(true); pywebview.api.greet(); });
</script>
</body>
</html>
