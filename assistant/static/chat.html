<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aide</title>
<style>
  /* ============================================================
     AIDE — final GUI
     Base: Direction C (minimal-pro / Linear-grade) — the craftsmanship
     IS the aesthetic. Monochrome-leaning surfaces, one calm blue accent,
     an exact 4px spacing scale, hairline separators, crisp flat outlines,
     minimal tight shadows, a single disciplined spring curve. No glow.
     Grafted in: a personalized time-of-day serif hero, a copy->check
     confirmation, and stricter send-button disable handling.
     ============================================================ */

  :root {
    color-scheme: light dark;

    /* --- spacing scale (4px base) --- */
    --s1: 4px;  --s2: 8px;  --s3: 12px; --s4: 16px;
    --s5: 20px; --s6: 24px; --s7: 32px; --s8: 40px;

    /* --- radii --- */
    --r-sm: 6px; --r-md: 9px; --r-lg: 13px; --r-xl: 18px;

    /* --- light theme: monochrome + single accent --- */
    --bg:           #ffffff;
    --surface:      #fbfbfc;     /* sidebar / raised */
    --surface-2:    #f4f4f6;     /* fills */
    --elevated:     #ffffff;
    --text:         #18181b;
    --text-2:       #56565c;     /* secondary */
    --text-3:       #6e6e74;     /* tertiary / placeholder — AA (~4.6:1) */
    --hairline:     rgba(0,0,0,0.085);
    --hairline-2:   rgba(0,0,0,0.055);
    --hover:        rgba(0,0,0,0.040);
    --active:       rgba(0,0,0,0.065);
    --fill:         rgba(0,0,0,0.045);
    --fill-hover:   rgba(0,0,0,0.075);
    --code-bg:      rgba(0,0,0,0.045);
    --sel:          rgba(40,110,235,0.18);

    --accent:       #2f6fed;     /* the one accent — calm blue */
    --accent-press: #2a62d2;
    --accent-soft:  rgba(47,111,237,0.12);
    --accent-ring:  rgba(47,111,237,0.32);
    --on-accent:    #ffffff;
    --link:         #2160d8;

    --ok:           #2f9e57;
    --warn:         #c4751b;     /* amber, NOT brown — decorative dot/star fills */
    --warn-text:    #a85d12;     /* AA amber for text states (~4.7:1 on white) */
    --danger:       #d6342c;
    --danger-bg:    rgba(214,52,44,0.11);
    --danger-bd:    rgba(214,52,44,0.26);

    --btn:          #18181b;     /* solid mono button (send) */
    --btn-fg:       #ffffff;

    --shadow-sm:    0 1px 2px rgba(0,0,0,0.05);
    --shadow-pop:   0 4px 16px rgba(0,0,0,0.10), 0 0 0 1px var(--hairline);

    --spring:       cubic-bezier(.32,1.18,.42,1);
    --ease:         cubic-bezier(.4,0,.2,1);

    --sidebar-w:    256px;
    --titlebar-inset: 30px;      /* clear the traffic lights */
  }

  :root[data-theme="dark"] {
      --bg:         #1a1a1c;
      --surface:    #141416;
      --surface-2:  #1f1f22;
      --elevated:   #232326;
      --text:       #f2f2f3;
      --text-2:     #a6a6ad;
      --text-3:     #8a8a92;     /* AA (~4.6:1 on #1a1a1c) */
      --hairline:   rgba(255,255,255,0.10);
      --hairline-2: rgba(255,255,255,0.06);
      --hover:      rgba(255,255,255,0.055);
      --active:     rgba(255,255,255,0.090);
      --fill:       rgba(255,255,255,0.060);
      --fill-hover: rgba(255,255,255,0.105);
      --code-bg:    rgba(255,255,255,0.070);
      --sel:        rgba(80,140,255,0.30);

      --accent:     #5b8def;
      --accent-press:#4d80e8;
      --accent-soft:rgba(91,141,239,0.18);
      --accent-ring:rgba(91,141,239,0.40);
      --on-accent:  #0d1220;
      --link:       #7fb0ff;

      --ok:         #44c47d;
      --warn:       #e0a347;
      --warn-text:  #e0a347;     /* already AA as text on dark (~7.86:1) */
      --danger:     #ff6b62;
      --danger-bg:  rgba(255,107,98,0.12);
      --danger-bd:  rgba(255,107,98,0.28);

      --btn:        #f2f2f3;
      --btn-fg:     #18181b;

      --shadow-sm:  0 1px 2px rgba(0,0,0,0.30);
      --shadow-pop: 0 6px 22px rgba(0,0,0,0.45), 0 0 0 1px var(--hairline);
  }

  * { box-sizing: border-box; -webkit-user-select: none; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    /* System font only — let macOS pick the SF optical size per text size
       (forcing "SF Pro Text" pinned the small-text variant everywhere).
       --fs is the user font scale (⌘+ / ⌘- / ⌘0), default 1. */
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: calc(15px * var(--fs, 1));
    line-height: 1.55;
    letter-spacing: -0.006em;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--sel); }
  :focus-visible { outline: none; }

  /* Vibrancy: gui.py adds .vibrancy to <html> only when it manages to install an
     NSVisualEffectView behind a non-opaque WKWebView. The sidebar then goes
     translucent so the blurred desktop shows through; the main pane stays
     opaque. Without the class, everything stays solid — the flat fallback. */
  html.vibrancy body { background: transparent; }
  html.vibrancy #sidebar { background: transparent; }
  html.vibrancy #main { background: var(--bg); }

  /* ===== APP MARK (orb) — subtle rotation, NO glow ===== */
  .mark {
    position: relative; flex: none; border-radius: 50%;
    width: 18px; height: 18px;
    background:
      radial-gradient(circle at 34% 30%, rgba(255,255,255,.85), rgba(255,255,255,0) 42%),
      conic-gradient(from 210deg, #ff6f9c, #ffb45f, #57c9ff, #5b8def, #ff6f9c);
    animation: spin 14s linear infinite;
  }
  .mark::after {     /* crisp hairline ring instead of a glow */
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.18);
  }
  :root[data-theme="dark"] .mark::after { box-shadow: inset 0 0 0 0.5px rgba(255,255,255,0.22); }
  @keyframes spin { to { transform: rotate(360deg); } }
  body.busy .mark { animation-duration: 2.4s; }

  /* ============================================================
     SIDEBAR
     ============================================================ */
  #sidebar {
    display: flex; flex-direction: column; flex: none;
    width: var(--sidebar-w); height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--hairline);
    padding: 0 var(--s3) var(--s3);
  }

  /* draggable top strip that clears traffic lights */
  .drag-strip {
    flex: none; height: var(--titlebar-inset); width: 100%;
  }

  .brand {
    display: flex; align-items: center; gap: 9px;
    padding: var(--s3) var(--s2) var(--s5);
    font-weight: 600; font-size: calc(15px * var(--fs, 1)); letter-spacing: -0.01em;
  }
  .brand .name { line-height: 1; }

  .nav { display: flex; flex-direction: column; gap: 3px; }

  .navItem {
    display: flex; align-items: center; gap: 10px; width: 100%;
    border: none; cursor: pointer; color: var(--text);
    padding: 0 var(--s2); height: 36px; border-radius: var(--r-md);
    background: transparent; font: inherit; font-size: calc(14px * var(--fs, 1));
    text-align: left; position: relative;
    transition: background .14s var(--ease), color .14s var(--ease);
  }
  .navItem:hover { background: var(--hover); }
  .navItem.active { background: var(--active); font-weight: 500; }
  .navItem:focus-visible { box-shadow: 0 0 0 2px var(--accent-ring); }
  .navItem svg { width: 15px; height: 15px; flex: none; opacity: .72; stroke: currentColor; }
  .navItem.primary { font-weight: 500; }
  .navItem.primary svg { opacity: .9; }
  .navItem .kbd {
    margin-left: auto; font-size: 11px; color: var(--text-3);
    letter-spacing: 0; font-variant-numeric: tabular-nums;
  }

  #searchBox { display: grid; grid-template-rows: 0fr;
    transition: grid-template-rows .22s var(--ease); margin-top: 0; }
  #searchBox.show { grid-template-rows: 1fr; margin: var(--s1) 0 var(--s1); }
  #searchBox > div { overflow: hidden; }
  #searchInput {
    width: 100%; border: 1px solid var(--hairline); outline: none;
    border-radius: var(--r-md); padding: 7px 11px; font: inherit; font-size: calc(13.5px * var(--fs, 1));
    color: var(--text); background: var(--bg);
    transition: border-color .16s var(--ease), box-shadow .16s var(--ease);
  }
  #searchInput::placeholder { color: var(--text-3); }
  #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  .sideHdr {
    font-size: calc(11.5px * var(--fs, 1)); font-weight: 600; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.05em;
    padding: var(--s4) var(--s2) var(--s2); user-select: none;
  }
  .sideHdr.tight { padding-top: var(--s3); }

  .scroll { overflow-y: auto; overflow-x: hidden; }
  .scroll::-webkit-scrollbar { width: 8px; }
  .scroll::-webkit-scrollbar-thumb {
    background: var(--fill-hover); border-radius: 6px;
    border: 2px solid transparent; background-clip: padding-box;
  }
  .scroll::-webkit-scrollbar-thumb:hover { background: var(--text-3); background-clip: padding-box; }
  #recents { flex: 1; min-height: 40px; margin: 0 calc(var(--s2) * -1); padding: 0 var(--s2); }
  #favorites { margin: 0 calc(var(--s2) * -1); padding: 0 var(--s2); }

  .conv {
    display: flex; align-items: center; gap: var(--s2);
    height: 32px; padding: 0 var(--s2); border-radius: var(--r-sm);
    cursor: pointer; font-size: calc(13.5px * var(--fs, 1)); color: var(--text-2);
    transition: background .14s var(--ease), color .14s var(--ease);
  }
  .conv:hover { background: var(--hover); color: var(--text); }
  .conv.active { background: var(--active); color: var(--text); font-weight: 500; }
  .conv:focus-visible { box-shadow: 0 0 0 2px var(--accent-ring); }
  .conv .t { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conv .star {
    opacity: 0; color: var(--text-3); flex: none;
    width: 18px; text-align: center; font-size: 12px;
    transition: opacity .14s var(--ease), color .14s var(--ease), transform .18s var(--spring);
  }
  .conv:hover .star { opacity: .6; }
  .conv .star.on { opacity: 1; color: var(--warn); }
  .conv .star:hover { transform: scale(1.22); color: var(--warn); }
  .conv .star:focus-visible { opacity: 1; box-shadow: 0 0 0 2px var(--accent-ring); }

  /* delete affordance: appears on hover, mirrors the favorite star. Two-step:
     first click arms a confirm state, second click within the window deletes. */
  .conv .del {
    opacity: 0; color: var(--text-3); flex: none; cursor: pointer;
    width: 18px; height: 18px; border: none; background: transparent; padding: 0;
    display: grid; place-items: center; border-radius: var(--r-sm);
    transition: opacity .14s var(--ease), color .14s var(--ease), background .14s var(--ease);
  }
  .conv:hover .del { opacity: .6; }
  .conv .del:hover { opacity: 1; color: var(--danger); }
  .conv .del:focus-visible { opacity: 1; box-shadow: 0 0 0 2px var(--accent-ring); }
  .conv .del svg { width: 13px; height: 13px; stroke: currentColor; }
  .conv .del.confirm {
    opacity: 1; color: var(--danger);
    background: var(--danger-bg); width: auto; padding: 0 7px;
    font-size: calc(11px * var(--fs, 1)); font-weight: 600;
  }
  .conv .del.confirm svg { display: none; }
  .conv .del.err { opacity: 1; color: var(--warn-text); }

  /* rename + export affordances: same size/visibility contract as .star/.del,
     hidden until row hover, fully visible on their own hover or keyboard focus */
  .conv .ren, .conv .exp {
    opacity: 0; color: var(--text-3); flex: none; cursor: pointer;
    width: 18px; height: 18px; border: none; background: transparent; padding: 0;
    display: grid; place-items: center; border-radius: var(--r-sm);
    transition: opacity .14s var(--ease), color .14s var(--ease), background .14s var(--ease);
  }
  .conv:hover .ren, .conv:hover .exp { opacity: .6; }
  .conv .ren:hover, .conv .exp:hover { opacity: 1; color: var(--accent); }
  .conv .ren:focus-visible, .conv .exp:focus-visible { opacity: 1; box-shadow: 0 0 0 2px var(--accent-ring); }
  .conv .ren svg, .conv .exp svg { width: 13px; height: 13px; stroke: currentColor; }
  .conv .exp.ok { opacity: 1; color: var(--ok); }

  /* inline rename field: swaps in for the title span. Crisp flat border, no glow. */
  .conv .renInput {
    flex: 1; min-width: 0; border: 1px solid var(--accent); outline: none;
    border-radius: 4px; padding: 1px 6px; margin: 0;
    font: inherit; font-size: calc(13.5px * var(--fs, 1)); color: var(--text);
    background: var(--bg); -webkit-user-select: text;
  }

  .sideFoot { flex: none; margin-top: var(--s2); padding-top: var(--s3); border-top: 1px solid var(--hairline); }

  #ctxPill {
    display: flex; align-items: center; gap: var(--s2); width: 100%;
    border: 1px solid var(--hairline); cursor: pointer;
    padding: 0 var(--s3); height: 34px; border-radius: var(--r-md);
    background: var(--bg); color: var(--text-2); font: inherit; font-size: calc(12.5px * var(--fs, 1));
    margin-bottom: var(--s2); transition: background .14s var(--ease), border-color .14s var(--ease);
  }
  #ctxPill:hover { background: var(--fill); }
  #ctxPill:focus-visible { box-shadow: 0 0 0 2px var(--accent-ring); }
  #ctxPill .label { flex: 1; text-align: left; }
  #ctxPill .dot {
    width: 7px; height: 7px; border-radius: 50%; flex: none;
    background: var(--ok); position: relative;
  }
  #ctxPill .dot::after {     /* crisp ring pulse, not a glow */
    content: ''; position: absolute; inset: -3px; border-radius: 50%;
    border: 1px solid var(--ok); opacity: 0; animation: ring 2.6s var(--ease) infinite;
  }
  @keyframes ring { 0% { opacity: .5; transform: scale(.7); } 70%,100% { opacity: 0; transform: scale(1.5); } }
  #ctxPill.off { color: var(--warn-text); border-color: var(--hairline); }
  #ctxPill.off .dot { background: var(--warn); }
  #ctxPill.off .dot::after { display: none; }

  .user { display: flex; align-items: center; gap: 10px; padding: var(--s1) var(--s2); }
  .user .av {
    width: 26px; height: 26px; border-radius: 50%; flex: none;
    background: var(--btn); color: var(--btn-fg);
    display: grid; place-items: center; font-weight: 600; font-size: 11px;
    box-shadow: inset 0 0 0 0.5px var(--hairline);
  }
  .user .nm { font-size: calc(13.5px * var(--fs, 1)); font-weight: 500; line-height: 1.2; }
  .user .sub { color: var(--text-3); font-size: calc(11.5px * var(--fs, 1)); line-height: 1.2; }

  /* ============================================================
     MAIN
     ============================================================ */
  #main { display: flex; flex-direction: column; flex: 1; min-width: 0; height: 100vh; position: relative; }

  #top {
    flex: none; display: flex; align-items: center; gap: var(--s1);
    height: var(--titlebar-inset); padding: 0 var(--s4) 0 var(--s5);
  }
  #top .sp { flex: 1; }
  #top .ctl {
    width: 30px; height: 30px; border: none; border-radius: var(--r-md);
    background: transparent; color: var(--text-2); cursor: pointer;
    display: grid; place-items: center;
    transition: background .14s var(--ease), color .14s var(--ease);
  }
  #top .ctl:hover { background: var(--fill); color: var(--text); }
  #top .ctl:focus-visible { box-shadow: 0 0 0 2px var(--accent-ring); }
  #top .ctl svg { width: 16px; height: 16px; stroke: currentColor; }
  #top .ctl.off { color: var(--warn-text); }
  #top .ctl.off .slash { display: inline !important; }

  /* Panel-header controls (context + feed). Without this they fall back to the
     browser's default button box with an unsized, invisible icon — they read as
     empty buttons. Match the top-bar controls; the close reads as a red X. */
  .ctxHead .ctl, .feedHead .ctl {
    width: 28px; height: 28px; border: none; border-radius: var(--r-md);
    background: transparent; color: var(--text-2); cursor: pointer;
    display: grid; place-items: center;
    transition: background .14s var(--ease), color .14s var(--ease);
  }
  .ctxHead .ctl:hover, .feedHead .ctl:hover { background: var(--fill); color: var(--text); }
  .ctxHead .ctl:focus-visible, .feedHead .ctl:focus-visible { box-shadow: 0 0 0 2px var(--accent-ring); }
  .ctxHead .ctl svg, .feedHead .ctl svg { width: 16px; height: 16px; stroke: currentColor; }
  #ctxClose, #feedClose { color: var(--danger); }
  #ctxClose:hover, #feedClose:hover { background: var(--danger-bg); color: var(--danger); }

  #log {
    flex: 1; overflow-y: auto; padding: var(--s2) var(--s7) var(--s5);
    scroll-behavior: smooth;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 16px, #000 calc(100% - 8px), transparent 100%);
  }
  #log::-webkit-scrollbar { width: 9px; }
  #log::-webkit-scrollbar-thumb {
    background: var(--fill-hover); border-radius: 6px;
    border: 2px solid transparent; background-clip: padding-box;
  }
  #log::-webkit-scrollbar-thumb:hover { background: var(--text-3); background-clip: padding-box; }
  #log.center { display: flex; flex-direction: column; justify-content: center; align-items: center; }
  #log.center > * { width: 100%; }

  .wrap { width: 100%; max-width: 760px; margin: 0 auto; }

  /* welcome / empty state */
  .welcome { display: none; flex-direction: column; align-items: center; text-align: center; padding-bottom: var(--s6); }
  #log.center .welcome { display: flex; }
  .welcome .heroMark {
    width: 38px; height: 38px; margin-bottom: var(--s5);
    animation: rise .5s var(--spring) both;
  }
  /* hero greeting — large SF Pro Display (the OS renders Display at this size) */
  .hero {
    font-size: calc(38px * var(--fs, 1)); line-height: 1.1; font-weight: 600;
    letter-spacing: -0.022em; margin: 0 0 var(--s6); max-width: 16ch;
    animation: rise .55s var(--spring) .04s both;
  }
  .hero .accent { color: var(--text-3); font-weight: 500; }
  .hero .nm { font-style: normal; }

  #chips {
    display: flex; flex-wrap: wrap; gap: var(--s2); justify-content: center;
    max-width: 540px;
  }
  .chip {
    cursor: pointer; padding: 0 var(--s4); height: 34px;
    display: inline-flex; align-items: center; gap: var(--s2);
    border-radius: 999px; font: inherit; font-size: calc(13.5px * var(--fs, 1)); font-weight: 450;
    color: var(--text); background: var(--bg);
    border: 1px solid var(--hairline);
    transition: transform .2s var(--spring), background .16s var(--ease), border-color .16s var(--ease);
  }
  .chip:hover { background: var(--fill); border-color: var(--hairline); transform: translateY(-1px); }
  .chip:active { transform: translateY(0) scale(.97); }
  .chip:focus-visible { box-shadow: 0 0 0 3px var(--accent-soft); border-color: var(--accent); }
  .chip svg { width: 14px; height: 14px; opacity: .6; stroke: currentColor; }

  /* message rows */
  .row { display: flex; margin: var(--s4) 0; animation: rise .45s var(--spring) both; }
  .row.u { justify-content: flex-end; }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } }

  .u .msg {
    max-width: 82%; padding: 9px var(--s4); border-radius: var(--r-xl);
    border-bottom-right-radius: var(--s1);
    background: var(--surface-2); border: 1px solid var(--hairline-2);
    color: var(--text); white-space: pre-wrap; word-wrap: break-word;
    -webkit-user-select: text; font-size: calc(15px * var(--fs, 1)); line-height: 1.5;
  }

  .b .msg {
    width: fit-content; max-width: 90%;
    padding: 11px 15px; border-radius: var(--r-xl); border-bottom-left-radius: var(--s1);
    background: var(--surface-2); border: 1px solid var(--hairline-2);
    font-size: calc(16px * var(--fs, 1)); line-height: 1.62;
    word-wrap: break-word; -webkit-user-select: text; color: var(--text);
  }
  /* keep the typing indicator bare (no bubble) */
  .b .msg.typing { width: auto; background: none; border: none; padding: var(--s3) 0; }
  .b .msg p { margin: .5em 0; }
  .b .msg p:first-child { margin-top: 0; }
  .b .msg p:last-child { margin-bottom: 0; }
  .b .msg h1, .b .msg h2, .b .msg h3 {
    margin: 1em 0 .35em; font-size: 1em; font-weight: 600; letter-spacing: -0.01em;
  }
  .b .msg h3:first-child { margin-top: 0; }
  .b .msg ul, .b .msg ol { margin: .45em 0; padding-left: 1.35em; }
  .b .msg li { margin: .2em 0; }
  .b .msg li::marker { color: var(--text-3); }
  .b .msg a { color: var(--link); text-decoration: none; border-bottom: 1px solid var(--accent-soft); }
  .b .msg a:hover { border-bottom-color: var(--link); }
  .b .msg code {
    font: calc(13px * var(--fs, 1)) ui-monospace, "SF Mono", Menlo, monospace;
    background: var(--code-bg); padding: 1.5px 5px; border-radius: 5px;
    border: 1px solid var(--hairline-2);
  }
  .b .msg pre {
    background: var(--code-bg); border: 1px solid var(--hairline);
    border-radius: var(--r-lg); padding: 12px 14px; overflow-x: auto; margin: .65em 0;
  }
  .b .msg pre code { background: none; padding: 0; border: none; }
  .b .msg strong, .b .msg b { font-weight: 600; }

  /* fenced code block: language tag + copy button on a thin header */
  .b .msg .codeblock { margin: .65em 0; }
  .b .msg .codeblock pre { margin: 0; border-top-left-radius: 0; border-top-right-radius: 0; }
  .b .msg .codeblock.bare pre { border-radius: var(--r-lg); }
  .codeHead {
    display: flex; align-items: center; gap: var(--s2);
    padding: 5px 8px 5px 12px;
    background: var(--code-bg); border: 1px solid var(--hairline);

<script>
  /* Set the theme before first paint so there's no flash. Mode is auto|light|dark;

      var dark = mode === 'dark' ||

          <button id="sendBtn" type="button" title="Send" aria-label="Send message">
            <svg viewBox="0 0 16 16" fill="none"><path d="M8 13.2V3.4M8 3.4 3.8 7.6M8 3.4l4.2 4.2" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
    </div>
  </main>

  <div id="ctxOverlay" hidden>
    <div id="ctxPanel" role="dialog" aria-modal="true" aria-label="What Aide knows right now">
      <div class="ctxHead">
        <span>What Aide knows right now</span>
        <span class="sp"></span>
        <button class="ctl" id="ctxRefresh" type="button" title="Refresh" aria-label="Refresh">
          <svg viewBox="0 0 16 16" fill="none"><path d="M13.2 8a5.2 5.2 0 1 1-1.55-3.7M13.2 2v3.1h-3.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="ctl" id="ctxClose" type="button" title="Close" aria-label="Close">
          <svg viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="ctxBody" id="ctxBody"></div>
      <div class="ctxFoot"><span id="ctxHome"></span><span class="sp"></span><span>Everything stays on this Mac</span></div>
    </div>
  </div>

  <div id="feedOverlay" hidden>
    <div id="feedPanel" role="dialog" aria-modal="true" aria-label="Proactive feed">
      <div class="feedHead">
        <span>Proactive</span>
        <span class="sp"></span>
        <button class="ctl" id="feedRefresh" type="button" title="Refresh" aria-label="Refresh">
          <svg viewBox="0 0 16 16" fill="none"><path d="M13.2 8a5.2 5.2 0 1 1-1.55-3.7M13.2 2v3.1h-3.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="ctl" id="feedClose" type="button" title="Close" aria-label="Close">
          <svg viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="feedBody" id="feedBody"></div>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  const log = $('log'), input = $('input'), btn = $('sendBtn');
  let botEl = null, botRaw = '', busy = false, draftEl = null;
  let lastUserText = '';   // last real user-sent text, for the Retry affordance

  /* send button morphs into a Stop control while a turn streams */
  const SEND_SVG = btn.innerHTML;
  const STOP_SVG = '<svg viewBox="0 0 16 16" fill="none"><rect x="4.6" y="4.6" width="6.8" height="6.8" rx="1.4" fill="currentColor"/></svg>';

  /* ---------- markdown renderer ----------
     Everything that reaches innerHTML is run through esc() first, so no source
     text is ever injected raw. Fenced code, tables, and blockquotes are pulled
     out into placeholders before inline formatting so their contents are not
     re-processed. */
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  /* inline spans only (code, bold, italic, links), used inside table cells */
  function mdInline(s) {
    return esc(s).replace(/`([^`\n]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>')
      .replace(/(^|\s)\*([^*\n]+)\*/g,'$1<i>$2</i>')
      .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2">$1</a>');
  }
  /* split a table row "| a | b |" into trimmed cells, tolerant of a leading /
     trailing pipe and of escaped \| inside a cell */
  function tableCells(line) {
    let row = line.trim().replace(/^\|/,'').replace(/\|$/,'');
    const cells = []; let cur = '';
    for (let i = 0; i < row.length; i++) {
      if (row[i] === '\\' && row[i + 1] === '|') { cur += '|'; i++; }
      else if (row[i] === '|') { cells.push(cur); cur = ''; }
      else cur += row[i];
    }
    cells.push(cur);
    return cells.map(c => c.trim());
  }
  /* a separator row is | --- | :--: | etc., only dashes, colons, spaces, pipes */
  const isTableSep = l => /^\s*\|?\s*:?-{1,}:?\s*(\|\s*:?-{1,}:?\s*)*\|?\s*$/.test(l) && l.includes('-');
  function md(src) {
    const blocks = [];
    const stash = html => `\x00${blocks.push(html) - 1}\x00`;

    /* fenced code blocks: keep the language label and the raw code (escaped). The
       Copy button is wired after injection from the rendered <code> textContent. */
    src = src.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      const body = esc(code.replace(/\n$/, ''));
      const tag = lang ? `<span class="lang">${esc(lang)}</span>` : '';
      const head =
        `<div class="codeHead">${tag}<span class="sp"></span>` +
        `<button class="codeCopy" type="button" title="Copy code" aria-label="Copy code">` +
        `${COPY_SVG}<span>Copy</span></button></div>`;
      return stash(`<div class="codeblock${lang ? '' : ' bare'}">${head}<pre><code>${body}</code></pre></div>`);
    });

    /* GitHub pipe tables: a header row, a separator row, then zero+ body rows */
    src = src.replace(/^(\|?.+\|.*)\n(\|?\s*:?-{1,}.*)\n((?:.*\|.*\n?)*)/gm, (m, header, sep, rows) => {
      if (!isTableSep(sep)) return m;
      const head = tableCells(header).map(c => `<th>${mdInline(c)}</th>`).join('');
      const body = rows.split('\n').filter(l => l.trim()).map(line =>
        `<tr>${tableCells(line).map(c => `<td>${mdInline(c)}</td>`).join('')}</tr>`).join('');
      return stash(`<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`) + '\n';
    });

    /* blockquotes: one or more consecutive "> " lines */
    src = src.replace(/^(?:[ \t]*>[ \t]?.*(?:\n|$))+/gm, m => {
      const inner = m.replace(/[ \t]*$/,'').split('\n').filter(l => /^\s*>/.test(l))
        .map(l => l.replace(/^\s*>[ \t]?/, '')).join('\n');
      return stash(`<blockquote>${md(inner)}</blockquote>`) + '\n';
    });

    let h = esc(src).replace(/`([^`\n]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>')
      .replace(/(^|\s)\*([^*\n]+)\*/g,'$1<i>$2</i>').replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2">$1</a>')
      .replace(/^###?#?\s+(.+)$/gm,'<h3>$1</h3>')
      .replace(/^(?:[-*]\s+.+\n?)+/gm, m => `<ul>${m.trim().split('\n').map(l=>`<li>${l.replace(/^[-*]\s+/,'')}</li>`).join('')}</ul>`)
      .replace(/^(?:\d+\.\s+.+\n?)+/gm, m => `<ol>${m.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\.\s+/,'')}</li>`).join('')}</ol>`);
    h = h.split(/\n{2,}/).map(p => /^(<(h3|ul|ol)|\x00)/.test(p.trim()) ? p : `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
    return h.replace(/\x00(\d+)\x00/g, (_, i) => blocks[i]);
  }

  /* ---------- layout helpers ---------- */
  /* Smooth scroll, rAF-coalesced. updateCenter() runs synchronously (cheap, and
     layout depends on it), but the smooth scrollTo is deferred to one per frame
     so a burst of appendText/appendTool calls can't stack several overlapping
     smooth animations that stutter. Mirrors scrollDownFast()'s coalescing. */
  let smoothQueued = false;
  function scrollDown() {
    updateCenter();
    if (smoothQueued) return;
    smoothQueued = true;
    requestAnimationFrame(() => {
      smoothQueued = false;
      log.scrollTo({ top: log.scrollHeight, behavior: 'smooth' });
    });
  }
  function updateCenter() {
    // Center only the resting welcome state (hero + chips, no messages yet).
    // Once any message row exists, use normal top-aligned chat flow so a single
    // reply doesn't float in the middle of an empty pane. The persistent typing
    // row is excluded so a hidden one left in the DOM never blocks centering.
    log.classList.toggle('center', !log.querySelector('.row:not(.typing-row)') && !!log.querySelector('.welcome'));
  }
  function addRow(cls, inner) {
    const w = document.createElement('div'); w.className = 'wrap';
    const r = document.createElement('div'); r.className = 'row ' + cls;
    r.appendChild(inner); w.appendChild(r); log.appendChild(w); scrollDown(); return inner;
  }
  function bubble(cls, text) {
    const e = document.createElement('div'); e.className = 'msg';
    if (text !== undefined) e.textContent = text; return addRow(cls, e);
  }
  /* One persistent typing node, shown/hidden rather than created/destroyed. The
     old code removed and rebuilt it between every text chunk and tool, so the
     dots vanished and re-popped (with the row entry animation) on each turn,
     a visible flicker. Now clearTyping() only hides it and showTyping() moves
     the same node to the bottom and reveals it, so there is no flash. */
  let typingWrap = null;     // cached ref, clear/show are O(1), no DOM scan per token
  function clearTyping() { if (typingWrap) typingWrap.style.display = 'none'; }
  function showTyping() {
    if (!typingWrap) {
      const t = document.createElement('div'); t.className = 'msg typing';
      t.innerHTML = '<span></span><span></span><span></span>';
      addRow('b typing-row', t);
      typingWrap = t.closest('.wrap');
    } else if (typingWrap !== log.lastElementChild) {
      log.appendChild(typingWrap);   // move to bottom without rebuilding (no re-animation)
    }
    typingWrap.style.display = '';
  }
  function setBusy(b) {
    busy = b; document.body.classList.toggle('busy', b);
    if (b) {
      /* morph send into Stop: enabled regardless of input contents */
      btn.disabled = false; btn.classList.remove('ready');
      btn.innerHTML = STOP_SVG; btn.title = 'Stop'; btn.setAttribute('aria-label', 'Stop response');
      showTyping();
    } else {
      /* restore send. Keep it disabled when the field is empty, so it can
         never fire on an empty turn after done() re-enables input. */
      btn.innerHTML = SEND_SVG; btn.title = 'Send'; btn.setAttribute('aria-label', 'Send message');
      const has = !!input.value.trim();
      btn.disabled = !has; btn.classList.toggle('ready', has);
      clearTyping();
    }
  }

  /* ---------- inline error row ---------- */
  /* One shared, dismissable error pill appended to the log, reusing the .err
     styling done() already uses. Every bridge failure path (open conversation,
     favorite, send) routes through here so nothing fails silently. Never
     alert()/confirm(): they block the WKWebView event loop. */
  function showInlineError(msg) {
    const e = document.createElement('div'); e.className = 'err';
    e.appendChild(document.createTextNode(msg));
    const x = document.createElement('button'); x.type = 'button'; x.className = 'x';
    x.title = 'Dismiss'; x.setAttribute('aria-label', 'Dismiss error'); x.textContent = '×';
    e.appendChild(x);
    const w = document.createElement('div'); w.className = 'wrap'; w.appendChild(e);
    x.onclick = () => w.remove();
    log.appendChild(w); scrollDown();
  }

  /* ---------- tool labels ---------- */
  const TOOL_NAMES = { Bash:'Running a command', Read:'Reading a file', Write:'Writing a file', Edit:'Editing a file',
    Glob:'Finding files', Grep:'Searching files', WebSearch:'Searching the web', WebFetch:'Reading a webpage', TodoWrite:'Planning',
    capture_screen:'Looking at your screen', add_task:'Adding a task', list_tasks:'Checking your tasks', due_tasks:'Checking what’s due',
    complete_task:'Completing a task', remember:'Saving to memory', journal:'Updating journal', recall_timeline:'Checking your activity',
    recall_screenshot:'Looking back in time', recall_search:'Searching your screen memory', recall_pause:'Pausing ambient memory', recall_forget:'Forgetting' };
  const toolLabel = n => TOOL_NAMES[n] || n.replace(/_/g,' ').replace(/([a-z])([A-Z])/g,'$1 $2');
  const COPY_SVG = '<svg viewBox="0 0 13 13" fill="none"><rect x="3.7" y="3.7" width="7.6" height="7.6" rx="1.6" stroke="currentColor" stroke-width="1.3"/><path d="M9.2 3.7V2.4A1.4 1.4 0 0 0 7.8 1H2.4A1.4 1.4 0 0 0 1 2.4v5.4a1.4 1.4 0 0 0 1.4 1.4h1.3" stroke="currentColor" stroke-width="1.3"/></svg>';
  const CHECK_SVG = '<svg viewBox="0 0 13 13" fill="none"><path d="M2.7 6.9l2.4 2.4 5.2-5.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  const TRASH_SVG = '<svg viewBox="0 0 16 16" fill="none"><path d="M3 4.2h10M6.4 4.2V3a1 1 0 0 1 1-1h1.2a1 1 0 0 1 1 1v1.2M4.3 4.2l.5 8a1 1 0 0 0 1 .9h4.4a1 1 0 0 0 1-.9l.5-8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  const PENCIL_SVG = '<svg viewBox="0 0 16 16" fill="none"><path d="m3.2 12.8.6-2.6 7-7a1.15 1.15 0 0 1 1.63 0l.37.37a1.15 1.15 0 0 1 0 1.63l-7 7-2.6.6Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>';
  const EXPORT_SVG = '<svg viewBox="0 0 16 16" fill="none"><path d="M8 2.6v7.2M8 9.8 5 6.8m3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 13h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>';

  /* copy button with a check-mark confirmation that reverts after 1.1s */
  function makeCopyBtn(getText) {
    const c = document.createElement('button'); c.className = 'copyBtn'; c.type = 'button';
    c.title = 'Copy'; c.setAttribute('aria-label', 'Copy message'); c.innerHTML = COPY_SVG;
    c.onclick = () => {
      const txt = getText();
      /* writeText can reject (denied permission / not focused); swallow it so the
         confirmation state still behaves and nothing throws into the console. */
      if (navigator.clipboard) navigator.clipboard.writeText(txt).catch(() => {});
      c.classList.add('copied'); c.innerHTML = CHECK_SVG;
      setTimeout(() => { c.classList.remove('copied'); c.innerHTML = COPY_SVG; }, 1100);
    };
    return c;
  }

  /* Code-block "Copy" buttons are produced as HTML by md(), so they can't carry a
     JS handler. One delegated listener copies the sibling <code>'s textContent.
     The browser has already decoded the escaped entities, so this is the raw
     source and stays XSS-safe (we never read innerHTML back). */
  log.addEventListener('click', e => {
    const c = e.target.closest('.codeCopy');
    if (!c) return;
    const code = c.closest('.codeblock').querySelector('code');
    const txt = code ? code.textContent : '';
    if (navigator.clipboard) navigator.clipboard.writeText(txt).catch(() => {});
    c.classList.add('copied');
    const label = c.querySelector('span');
    if (label) label.textContent = 'Copied';
    clearTimeout(c._t);
    c._t = setTimeout(() => { c.classList.remove('copied'); if (label) label.textContent = 'Copy'; }, 1100);
  });

  /* ---------- bot bubble / draft ---------- */
  function ensureBot() {
    if (!botEl) {
      clearWelcome();   // a real reply replaces the welcome hero
      botEl = bubble('b'); botRaw = '';
      const el = botEl;
      botEl.parentElement.appendChild(makeCopyBtn(() => el._raw || el.textContent));
    }
    return botEl;
  }
  function clearDraft() { if (draftEl) draftEl.remove(); draftEl = null; }

  /* ---------- welcome / empty state ---------- */
  function greetingLine() {
    const h = new Date().getHours();
    const part = h < 5 ? 'Still up' : h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
    const name = (window.AIDE_USER || '').trim();
    const lead = name
      ? `${part}, <span class="nm">${esc(name)}</span>.`
      : `${part}.`;
    return `${lead}<br><span class="accent">What can I help with?</span>`;
  }

  function showWelcome() {
    const wrap = document.createElement('div'); wrap.className = 'wrap';
    const w = document.createElement('div'); w.className = 'welcome';

    const m = document.createElement('div'); m.className = 'mark heroMark'; m.setAttribute('aria-hidden','true');
    const hero = document.createElement('div'); hero.className = 'hero';
    hero.innerHTML = greetingLine();
    w.appendChild(m); w.appendChild(hero);

    const chips = document.createElement('div'); chips.id = 'chips';
    /* icon names the bridge can send, all in the same 1.4-stroke flat style.
       sun/moon reuse the theme-toggle SVGs (initialized by the time this runs). */
    const CHIP_ICON = {
      screen: '<svg viewBox="0 0 16 16" fill="none"><rect x="1.6" y="2.6" width="12.8" height="8.8" rx="1.8" stroke="currentColor" stroke-width="1.4"/><path d="M5.5 14h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>',
      calendar: '<svg viewBox="0 0 16 16" fill="none"><rect x="2.5" y="3" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M2.5 6.5h11M5 1.8v2.4M11 1.8v2.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>',
      clock: '<svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 4.6V8l2.4 1.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      mail: '<svg viewBox="0 0 16 16" fill="none"><rect x="2" y="3.5" width="12" height="9" rx="1.6" stroke="currentColor" stroke-width="1.4"/><path d="m2.6 4.5 5.4 4 5.4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      sun: SUN_SVG,
      moon: MOON_SVG,
      spark: '<svg viewBox="0 0 16 16" fill="none"><path d="M8 1.9 9.5 6.5 14.1 8 9.5 9.5 8 14.1 6.5 9.5 1.9 8 6.5 6.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>'
    };
    /* screen chips route through askScreen() (eye bubble + canned prompt);
       everything else submits its prompt through the normal send path */
    const fill = items => {
      chips.innerHTML = '';
      items.forEach((s, i) => {
        const b = document.createElement('button'); b.className = 'chip'; b.type = 'button';
        b.innerHTML = (CHIP_ICON[s.icon] || CHIP_ICON.spark) + '<span>' + esc(s.label) + '</span>';
        b.style.animation = `rise .5s var(--spring) ${.12 + i*.06}s both`;
        b.onclick = () => s.icon === 'screen' ? askScreen() : submit(s.prompt);
        chips.appendChild(b);
      });
    };
    fill([
      {icon: 'screen',   label: 'What’s on my screen', prompt: ''},
      {icon: 'calendar', label: 'Plan my day',         prompt: 'Plan my day: check my tasks and calendar and lay out a plan.'},
      {icon: 'clock',    label: 'What’s due',          prompt: 'What tasks are due or overdue?'},
      {icon: 'mail',     label: 'Check my email',      prompt: 'Check my recent email and summarize anything that needs my attention.'}
    ]);
    w.appendChild(chips);
    wrap.appendChild(w); log.appendChild(wrap); updateCenter();

    /* Context-aware chips, fetched fresh on every hero show (launch and New
       Chat) so they track tasks, recall, connectors, and time of day. The
       static set above stands if the call fails or returns nothing; isConnected
       guards against painting into a hero the user has already left. */
    try {
      Promise.resolve(pywebview.api.welcome_suggestions()).then(list => {
        if (Array.isArray(list) && list.length && chips.isConnected) fill(list);
      }).catch(e => console.error(e));
    } catch (e) { console.error(e); }
  }

  /* gui.py injects window.AIDE_USER via evaluate_js; on launch the hero can
     render before that lands, so the injection calls this to re-greet by name. */
  window.refreshHeroName = () => {
    const h = log.querySelector('.welcome .hero');
    if (h) h.innerHTML = greetingLine();
  };

  /* ===================================================================
     CALLED FROM PYTHON — names + shapes preserved exactly
     =================================================================== */
  /* rAF-coalesced instant scroll for streaming: at most one scroll per frame,
     no smooth-animation restarts, no center recomputation per token. */
  let scrollQueued = false;
  function scrollDownFast() {
    if (scrollQueued) return;
    scrollQueued = true;
    requestAnimationFrame(() => { scrollQueued = false; log.scrollTop = log.scrollHeight; });
  }
  window.streamText = t => {
    clearTyping();
    const el = ensureBot();
    if (!draftEl) { draftEl = document.createElement('div'); draftEl.className = 'draft'; el.appendChild(draftEl); }
    draftEl.appendChild(document.createTextNode(t));   // append, don't rewrite the draft
    scrollDownFast();
  };
  window.appendText = t => {
    clearTyping(); clearDraft();
    const el = ensureBot();
    botRaw += (botRaw ? '\n\n' : '') + t; el.innerHTML = md(botRaw); el._raw = botRaw;
    scrollDown(); showTyping();
  };
  window.appendTool = name => {
    clearTyping(); clearDraft();
    const c = document.createElement('div'); c.className = 'tool';
    c.innerHTML = `<span class="pulse"></span>${esc(toolLabel(name.replace(/^mcp__\w+__/,'')))}`;
    addRow('b', c); scrollDown(); showTyping();
  };
  window.done = err => {
    clearTyping(); clearDraft();
    if (err === 'stopped') {
      /* user-initiated stop: a quiet dim note, deliberately not an error pill */
      const e = document.createElement('div'); e.className = 'stopped'; e.textContent = '(stopped)';
      const w = document.createElement('div'); w.className = 'wrap'; w.appendChild(e); log.appendChild(w); scrollDown();
    } else if (err) {
      const e = document.createElement('div'); e.className = 'err'; e.textContent = 'stopped: ' + err;
      /* offer Retry only when a real user message exists for this turn; the
         launch greeting and screen capture never set lastUserText */
      if (lastUserText) {
        const txt = lastUserText;
        const rb = document.createElement('button'); rb.type = 'button'; rb.className = 'retry';
        rb.textContent = 'Retry'; rb.title = 'Send that message again';
        rb.setAttribute('aria-label', 'Retry last message');
        rb.onclick = () => { rb.remove(); submit(txt); };
        e.appendChild(rb);
      }
      const w = document.createElement('div'); w.className = 'wrap'; w.appendChild(e); log.appendChild(w); scrollDown();
    }
    document.querySelectorAll('.tool .pulse').forEach(p => p.remove());
    botEl = null; botRaw = ''; setBusy(false);
    if (listsDirty) { listsDirty = false; refreshLists(); }   // only when the sidebar changed
    input.focus();
  };
  window.focusInput = () => input.focus();

  /* ---------- submit / screen ---------- */
  function clearWelcome() {
    log.querySelectorAll('.wrap').forEach(w => { if (w.querySelector('#chips') || w.querySelector('.welcome')) w.remove(); });
  }
  /* The sidebar only changes when a chat gains its title (first message) or an
     old chat is continued (recency reorder) — mark those so done() can skip the
     fetch + full rebuild on every other turn. */
  let listsDirty = false, openedFromHistory = false;
  function markListsMaybeDirty() {
    if (!log.querySelector('.row.u') || openedFromHistory) {
      listsDirty = true; openedFromHistory = false;
    }
  }
  /* The bridge call itself can reject or throw (pywebview not ready, Python
     handler raised before streaming started). Without this, setBusy(true)
     leaves the typing dots and disabled send button stuck forever. done()
     reuses the normal end-of-turn cleanup, so input is re-enabled and the
     typing indicator is cleared. */
  function sendToBridge(text) {
    const fail = err => {
      console.error(err);
      showInlineError('Message failed to send. Try again.');
      done();
    };
    try {
      Promise.resolve(pywebview.api.send(text)).then(res => {
        /* The bridge serializes turns; "busy" means a turn is still streaming
           (a race the disabled Send button usually prevents). */
        if (res === 'busy') { showInlineError('Still working on the previous message.'); done(); }
      }).catch(fail);
    }
    catch (err) { fail(err); }
  }

  function convRow(c) {
    const r = document.createElement('div'); r.className = 'conv'; r.dataset.id = c.id;
    r.tabIndex = 0; r.setAttribute('role', 'button');
    const t = document.createElement('span'); t.className = 't'; t.textContent = c.title || 'New chat';
    const s = document.createElement('span'); s.className = 'star' + (c.favorite ? ' on' : ''); s.textContent = '★';
    s.tabIndex = 0; s.setAttribute('role', 'button');

      .then(refreshLists)
      .catch(e => {

    s.onkeydown = e => {

    };

    /* Delete: inline two-step confirm (no JS confirm()/alert(), which would block
       the WKWebView event loop). First activation arms a "Delete?" state that
       auto-reverts after a few seconds; a second activation within that window
       deletes. The API call is guarded so a failure surfaces inline, not silently. */
    const d = document.createElement('button'); d.type = 'button'; d.className = 'del';
    d.tabIndex = 0; d.title = 'Delete'; d.setAttribute('aria-label', 'Delete conversation');
    d.innerHTML = TRASH_SVG;
    let armed = false, armTimer = 0;
    const disarm = () => {
      armed = false; clearTimeout(armTimer);
      d.classList.remove('confirm', 'err'); d.innerHTML = TRASH_SVG;
      d.title = 'Delete'; d.setAttribute('aria-label', 'Delete conversation');
    };
    const arm = () => {
      armed = true;
      d.classList.remove('err'); d.classList.add('confirm'); d.textContent = 'Delete?';
      d.title = 'Click again to delete'; d.setAttribute('aria-label', 'Confirm delete');
      clearTimeout(armTimer); armTimer = setTimeout(disarm, 3200);
    };
    const doDelete = async () => {
      clearTimeout(armTimer);
      try {
        await pywebview.api.delete_conversation(c.id);
        refreshLists();
      } catch (e) {
        armed = false;
        d.classList.remove('confirm'); d.classList.add('err'); d.textContent = 'Failed';
        d.title = 'Delete failed'; d.setAttribute('aria-label', 'Delete failed');
        clearTimeout(armTimer); armTimer = setTimeout(disarm, 2400);
      }
    };
    const onDel = () => { armed ? doDelete() : arm(); };
    d.onclick = e => { e.stopPropagation(); onDel(); };
    d.onkeydown = e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.stopPropagation(); onDel(); }
      else if (e.key === 'Escape' && armed) { e.preventDefault(); e.stopPropagation(); disarm(); }
    };
    /* leaving the row cancels a pending confirm so a stray arm doesn't linger */
    r.addEventListener('mouseleave', () => { if (armed) disarm(); });

    /* Rename: swap the title span for an inline input. Enter commits, Escape or
       blur cancels. Never prompt()/alert(): they block the WKWebView event loop. */
    const rn = document.createElement('button'); rn.type = 'button'; rn.className = 'ren';
    rn.tabIndex = 0; rn.title = 'Rename'; rn.setAttribute('aria-label', 'Rename conversation');
    rn.innerHTML = PENCIL_SVG;
    const startRename = () => {
      if (r.querySelector('.renInput')) return;
      const inp = document.createElement('input'); inp.className = 'renInput';
      inp.type = 'text'; inp.spellcheck = false; inp.value = c.title || '';
      inp.setAttribute('aria-label', 'Conversation title');
      let settled = false;
      /* isConnected guard: an external list refresh can re-render the row and
         detach this input before a delayed blur fires; restoring a detached
         node would be a silent no-op at best. */
      const cancel = () => { if (settled || !inp.isConnected) return; settled = true; inp.replaceWith(t); };
      const commit = () => {
        if (settled) return;
        const v = inp.value.trim();
        if (!v || v === (c.title || '')) { cancel(); return; }
        settled = true;
        try {
          Promise.resolve(pywebview.api.rename_conversation(c.id, v)).then(res => {
            if (res === 'ok') refreshLists();
            else inp.replaceWith(t);          // "empty" (or anything else): just cancel
          }).catch(e => {
            console.error(e); showInlineError('Could not rename conversation.'); inp.replaceWith(t);
          });
        } catch (e) {
          console.error(e); showInlineError('Could not rename conversation.'); inp.replaceWith(t);
        }

      inp.onkeydown = e => {

        if (e.key === 'Enter') { e.preventDefault(); commit(); }
        else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
      };

      inp.onclick = e => e.stopPropagation();

    rn.onclick = e => { e.stopPropagation(); startRename(); };
    rn.onkeydown = e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.stopPropagation(); startRename(); }
    };

    /* Export: the bridge writes a markdown file and reveals it in Finder. The
       icon flips to a checkmark for ~2s as the in-place confirmation. */
    const ex = document.createElement('button'); ex.type = 'button'; ex.className = 'exp';
    ex.tabIndex = 0; ex.title = 'Export conversation'; ex.setAttribute('aria-label', 'Export conversation');
    ex.innerHTML = EXPORT_SVG;
    let exTimer = 0;
    const exFail = e => { if (e) console.error(e); showInlineError('Could not export that conversation.'); };
    const doExport = () => {
      try {
        Promise.resolve(pywebview.api.export_conversation(c.id)).then(path => {
          if (!path) { exFail(); return; }
          ex.classList.add('ok'); ex.innerHTML = CHECK_SVG; ex.title = 'Exported';
          clearTimeout(exTimer);
          exTimer = setTimeout(() => {
            ex.classList.remove('ok'); ex.innerHTML = EXPORT_SVG; ex.title = 'Export conversation';
          }, 2000);
        }).catch(exFail);
      } catch (e) { exFail(e); }
    };
    ex.onclick = e => { e.stopPropagation(); doExport(); };
    ex.onkeydown = e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.stopPropagation(); doExport(); }
    };

    r.append(t, s, rn, ex, d); r.onclick = () => openConv(c.id, r);
    r.onkeydown = e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openConv(c.id, r); }
    };

  }
  function render(el, items) { el.innerHTML = ''; items.forEach(c => el.appendChild(convRow(c))); }
  async function refreshLists() {
    try {
      const { recents, favorites } = await pywebview.api.list_conversations();
      $('favHdr').style.display = favorites.length ? 'block' : 'none';
      render($('favorites'), favorites); render($('recents'), recents);

  }

  /* ---------- wiring ---------- */
  btn.onclick = () => {
    if (busy) { stopTurn(); return; }   // while streaming this button is Stop
    const t = input.value.trim(); input.value = ''; input.style.height = 'auto';
    btn.classList.remove('ready'); submit(t);
  };
  $('screenBtn').onclick = askScreen;
  $('navNew').onclick = startNew; $('newBtn2').onclick = startNew;
  $('navSearch').onclick = () => {

    else { $('searchInput').value = ''; refreshLists(); }
  };
  $('navRoutines').onclick = () => openFeedPanel();
  /* Debounced search: only the settled query hits sqlite, and a sequence token
     drops out-of-order responses so a stale prefix can't paint over the result. */
  let searchTimer = 0, searchSeq = 0;
  $('searchInput').addEventListener('input', e => {
    clearTimeout(searchTimer);
    const q = e.target.value.trim();
    searchTimer = setTimeout(async () => {
      const seq = ++searchSeq;
      if (!q) { refreshLists(); return; }
      try {
        const res = await pywebview.api.search_conversations(q);
        if (seq !== searchSeq) return;          // superseded by newer keystrokes
        render($('recents'), res);
        $('favHdr').style.display = 'none'; $('favorites').innerHTML = '';
      } catch (err) {
        if (seq !== searchSeq) return;          // a newer query owns the list now
        console.error(err);
        /* mirror the success path's layout so stale results never linger */
        $('favHdr').style.display = 'none'; $('favorites').innerHTML = '';
        const r = $('recents'); r.innerHTML = '';
        const e = document.createElement('div'); e.className = 'sideErr';
        e.textContent = 'Search failed';
        r.appendChild(e);
      }
    }, 180);
  });

  async function toggleRecall() {
    try {

      rb.setAttribute('aria-label', rb.title);

    } catch (e) {}
  }
  $('recallBtn').onclick = toggleRecall;
  $('ctxPill').onclick = toggleRecall;

  /* ---------- appearance: auto / light / dark (persisted) ---------- */
  const THEME_KEY = 'aide.theme';
  const SUN_SVG = '<svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3.1" stroke="currentColor" stroke-width="1.4"/><path d="M8 1.3v1.7M8 13v1.7M1.3 8h1.7M13 8h1.7M3.3 3.3l1.2 1.2M11.5 11.5l1.2 1.2M12.7 3.3l-1.2 1.2M4.5 11.5l-1.2 1.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>';
  const MOON_SVG = '<svg viewBox="0 0 16 16" fill="none"><path d="M13.4 9.4A5.6 5.6 0 0 1 6.6 2.6 5.6 5.6 0 1 0 13.4 9.4Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>';
  const AUTO_SVG = '<svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 2a6 6 0 0 0 0 12Z" fill="currentColor"/></svg>';
  const THEME_ICON = { auto: AUTO_SVG, light: SUN_SVG, dark: MOON_SVG };
  const mql = window.matchMedia('(prefers-color-scheme: dark)');
  let themeMode = (() => { try { return localStorage.getItem(THEME_KEY) || 'auto'; } catch (e) { return 'auto'; } })();
  function applyTheme() {
    const dark = themeMode === 'dark' || (themeMode === 'auto' && mql.matches);
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    const b = $('themeBtn');
    if (b) {
      b.innerHTML = THEME_ICON[themeMode];
      b.title = 'Appearance: ' + themeMode[0].toUpperCase() + themeMode.slice(1) + ' (click to change)';
      b.setAttribute('aria-label', b.title);
    }
  }
  function cycleTheme() {
    themeMode = themeMode === 'auto' ? 'light' : themeMode === 'light' ? 'dark' : 'auto';
    try { localStorage.setItem(THEME_KEY, themeMode); } catch (e) {}
    applyTheme();
  }
  mql.addEventListener('change', () => { if (themeMode === 'auto') applyTheme(); });
  $('themeBtn').onclick = cycleTheme;
  applyTheme();

  /* ---------- context panel: what Aide knows right now (⌘I) ---------- */
  const ctxOverlay = $('ctxOverlay'), ctxBody = $('ctxBody');
  function ctxSection(title) {
    const s = document.createElement('div'); s.className = 'ctxSec';
    const h = document.createElement('h4'); h.textContent = title; s.appendChild(h);
    ctxBody.appendChild(s); return s;
  }
  function ctxCard(sec, text, label) {       // textContent only — memory/task text is never injected as HTML
    const c = document.createElement('div'); c.className = 'ctxCard';
    c.textContent = text;
    if (label) { const l = document.createElement('div'); l.className = 'lbl'; l.textContent = label; c.prepend(l); }
    sec.appendChild(c); return c;
  }
  function ctxEmpty(sec, text) {
    const e = document.createElement('div'); e.className = 'ctxEmpty';
    e.textContent = text; sec.appendChild(e);
  }
  const MEM_LABELS = { profile: 'Profile', preferences: 'Preferences', projects: 'Projects', inbox: 'Memory inbox' };
  function renderCtx(d) {
    ctxBody.innerHTML = '';
    ctxCard(ctxSection('Brain'), d.brain || 'unknown');

    const now = ctxSection('Right now · ambient context');
    if (d.context) ctxCard(now, d.context);
    ctxEmpty(now, d.recall
      ? (d.context ? 'Attached to every message you send.' : 'Recall is on — nothing captured yet.')
      : 'Ambient recall is paused — messages carry no context.');

    const mem = ctxSection('Long-term memory');
    let any = false;
    for (const k of ['profile', 'preferences', 'projects', 'inbox']) {
      const raw = ((d.memory || {})[k] || '');
      // hide template-only files (heading + "(placeholder)" line, no real entries)
      const lines = raw.split('\n').map(l => l.trim())
        .filter(l => l && !l.startsWith('#') && !(l.startsWith('(') && l.endsWith(')')));
      if (!lines.length) continue;
      any = true;
      ctxCard(mem, lines.join('\n'), MEM_LABELS[k]);
    }
    if (!any) ctxEmpty(mem, 'Nothing saved yet — Aide stores durable facts here as you chat (or tell it to "remember…").');

    const tsec = ctxSection('Tasks');
    const due = (d.tasks || {}).due || [], open = (d.tasks || {}).open || [];
    if (due.length) ctxCard(tsec, due.join('\n'), 'Due within 24h');
    const rest = open.filter(t => !due.includes(t));
    if (rest.length) ctxCard(tsec, rest.join('\n'), 'Open');
    if (!due.length && !open.length) ctxEmpty(tsec, 'No open tasks.');

    $('ctxHome').textContent = d.home || '';
  }
  async function openContextPanel() {
    ctxOverlay.hidden = false;
    ctxBody.innerHTML = '';
    ctxEmpty(ctxSection('Working memory'), 'Gathering…');
    try { renderCtx(await pywebview.api.context_snapshot()); }
    catch (e) { ctxBody.innerHTML = ''; ctxEmpty(ctxSection('Error'), 'Could not load: ' + e); }
  }
  function closeContextPanel() { ctxOverlay.hidden = true; input.focus(); }
  $('navContext').onclick = openContextPanel;
  $('ctxRefresh').onclick = openContextPanel;
  $('ctxClose').onclick = closeContextPanel;
  ctxOverlay.addEventListener('mousedown', e => { if (e.target === ctxOverlay) closeContextPanel(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && !ctxOverlay.hidden) { e.preventDefault(); closeContextPanel(); }
    else if (e.key === 'Escape' && !feedOverlay.hidden) { e.preventDefault(); closeFeedPanel(); }
    else if (e.key === 'Escape' && busy) { e.preventDefault(); stopTurn(); }
    else if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'i') {
      e.preventDefault();
      if (ctxOverlay.hidden) openContextPanel(); else closeContextPanel();
    }
  });

  /* ---------- proactive feed: items that need the user (Routines nav) ----------
     Same overlay/scrim/escape contract as the context panel. Every bridge call is
     guarded; a failure logs + surfaces an inline error rather than leaving a
     half-rendered panel. No alert()/confirm() (they block the WKWebView loop). */
  const feedOverlay = $('feedOverlay'), feedBody = $('feedBody'), feedDot = $('feedDot');
  const THUMB_UP_SVG = '<svg viewBox="0 0 16 16" fill="none"><path d="M5 7.2 7.6 2c.9 0 1.6.8 1.4 1.7L8.6 6h3.1a1.4 1.4 0 0 1 1.4 1.7l-.9 4.2a1.6 1.6 0 0 1-1.55 1.25H5V7.2Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M5 7.2H2.8v6h2.2" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>';
  const THUMB_DN_SVG = '<svg viewBox="0 0 16 16" fill="none"><path d="M11 8.8 8.4 14c-.9 0-1.6-.8-1.4-1.7L7.4 10H4.3a1.4 1.4 0 0 1-1.4-1.7l.9-4.2A1.6 1.6 0 0 1 5.35 2.85H11V8.8Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M11 8.8h2.2v-6H11" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>';

  /* small wrapper: resolve a bridge promise, log + surface a message on failure */
  function feedCall(fn, msg) {
    try { return Promise.resolve(fn()).catch(e => { console.error(e); if (msg) showInlineError(msg); throw e; }); }
    catch (e) { console.error(e); if (msg) showInlineError(msg); return Promise.reject(e); }
  }

  function feedEmptyState() {
    feedBody.innerHTML = '';

  function feedCardEl(item) {
    const card = document.createElement('div');
    card.className = 'feedCard';
    if (item.urgency === 'notify') card.classList.add('notify');
    if ((item.category || '').toLowerCase() === 'system') card.classList.add('system');

    const chip = document.createElement('span'); chip.className = 'chip';
    chip.textContent = item.category || 'note';
    card.appendChild(chip);

    if (item.title) {
      const t = document.createElement('div'); t.className = 'fTitle';
      t.textContent = item.title; card.appendChild(t);
    }
    if (item.body) {
      const b = document.createElement('div'); b.className = 'fBody';
      b.textContent = item.body; card.appendChild(b);   // textContent preserves newlines via pre-wrap
    }
    if (item.source) {
      const w = document.createElement('div'); w.className = 'fWhy';
      w.textContent = item.source; card.appendChild(w);
    }

    const actions = document.createElement('div'); actions.className = 'feedActions';

    /* Do it: proactive_act marks the item done and returns its suggested prompt;
       we close the panel and run it through the normal send path so the user

    const doBtn = document.createElement('button'); doBtn.type = 'button';
    doBtn.className = 'feedAct primary'; doBtn.textContent = 'Do it';
    doBtn.title = item.action_prompt || 'Run this';
    doBtn.onclick = () => {
      doBtn.disabled = true;

        .then(prompt => {
          closeFeedPanel();
          const text = (prompt || item.action_prompt || '').trim();
          if (text) submit(text);
        })
        .catch(() => { doBtn.disabled = false; });
    };
    actions.appendChild(doBtn);

    /* Snooze 3h: remove the card on success */
    const snBtn = document.createElement('button'); snBtn.type = 'button';
    snBtn.className = 'feedAct'; snBtn.textContent = 'Snooze 3h';
    snBtn.title = 'Snooze for 3 hours';
    snBtn.onclick = () => {
      snBtn.disabled = true;
      feedCall(() => pywebview.api.proactive_snooze(item.id, 3), 'Could not snooze that.')
        .then(() => removeCard(card))
        .catch(() => { snBtn.disabled = false; });
    };
    actions.appendChild(snBtn);

    /* Dismiss: remove the card on success */
    const dsBtn = document.createElement('button'); dsBtn.type = 'button';
    dsBtn.className = 'feedAct'; dsBtn.textContent = 'Dismiss';
    dsBtn.title = 'Dismiss';
    dsBtn.onclick = () => {
      dsBtn.disabled = true;
      feedCall(() => pywebview.api.proactive_dismiss(item.id), 'Could not dismiss that.')
        .then(() => removeCard(card))
        .catch(() => { dsBtn.disabled = false; });

    actions.appendChild(dsBtn);

    const sp = document.createElement('span'); sp.className = 'sp'; actions.appendChild(sp);

    /* thumbs: mark the chosen one active; the other clears. Feedback is one-way. */
    const up = document.createElement('button'); up.type = 'button';
    up.className = 'feedThumb up'; up.title = 'Helpful';
    up.setAttribute('aria-label', 'Mark helpful'); up.innerHTML = THUMB_UP_SVG;

    dn.className = 'feedThumb down'; dn.title = 'Not helpful';
    dn.setAttribute('aria-label', 'Mark not helpful'); dn.innerHTML = THUMB_DN_SVG;

        .then(() => {

  /* drop a card; fall back to the empty state if it was the last one */
  function removeCard(card) {
    card.remove();

  }

  function renderFeed(items) {
    feedBody.innerHTML = '';

    items.forEach((item, i) => {

    feedCall(() => pywebview.api.proactive_mark_seen()).catch(() => {});
    feedCall(() => pywebview.api.proactive_feed(), 'Could not load your feed.')
      .then(items => { if (!feedOverlay.hidden) renderFeed(items); })
      .catch(() => { if (!feedOverlay.hidden) feedEmptyState(); });
  }
  function closeFeedPanel() {
    feedOverlay.hidden = true; input.focus();
    refreshFeedDot();   // an action may have changed what's pending
  }
  $('feedRefresh').onclick = openFeedPanel;
  $('feedClose').onclick = closeFeedPanel;
  feedOverlay.addEventListener('mousedown', e => { if (e.target === feedOverlay) closeFeedPanel(); });

  input.addEventListener('keydown', e => {
    /* Enter while busy is ignored (it must not trigger Stop, and the old path
       silently dropped the typed text); the user keeps their draft. */
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!busy) btn.onclick(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto'; input.style.height = input.scrollHeight + 'px';
    if (busy) return;   // Stop mode owns the button while a turn is in flight
    const has = !!input.value.trim();
    btn.classList.toggle('ready', has);
    btn.disabled = !has;
  });

  /* ⌘N starts a new chat */
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'n') { e.preventDefault(); startNew(); }
  });

  /* ⌘+ / ⌘- / ⌘0 — font size, like a native app (persisted) */
  const FS_KEY = 'aide.fontScale';
  function curFontScale() {
    return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fs')) || 1;
  }
  function setFontScale(s) {
    s = Math.min(1.6, Math.max(0.85, Math.round(s * 100) / 100));
    document.documentElement.style.setProperty('--fs', s);
    try { localStorage.setItem(FS_KEY, s); } catch (e) {}
  }
  try { const v = parseFloat(localStorage.getItem(FS_KEY)); if (v) document.documentElement.style.setProperty('--fs', v); } catch (e) {}
  document.addEventListener('keydown', e => {
    if (!(e.metaKey || e.ctrlKey)) return;
    if (e.key === '=' || e.key === '+') { e.preventDefault(); setFontScale(curFontScale() + 0.1); }
    else if (e.key === '-' || e.key === '_') { e.preventDefault(); setFontScale(curFontScale() - 0.1); }
    else if (e.key === '0') { e.preventDefault(); setFontScale(1); }
  });

  /* ---------- lifecycle ---------- */
  window.addEventListener('pywebviewready', () => {
    // Always land on the hero. It greets by name locally (zero latency, no
    // model call), and showWelcome() fetches context-aware chips itself; no
    // auto-greet turn runs on launch.
    refreshLists(); showWelcome(); refreshFeedDot();
  });
</script>
</body>
</html>
