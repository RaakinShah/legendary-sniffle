<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* Siri AI on macOS: floating dark glass — pill summon state + conversation panel */
  :root {
    --glass: rgba(24, 24, 27, 0.78);
    --glass-border: rgba(255, 255, 255, 0.14);
    --text: #f5f5f7;
    --dim: rgba(235, 235, 245, 0.55);
    --fill: rgba(255, 255, 255, 0.10);
    --fill-hover: rgba(255, 255, 255, 0.18);
    --accent: #0a84ff;
    --orb: conic-gradient(from 200deg, #ff5fa2, #ffb45f, #5fd4ff, #a05fff, #ff5fa2);
    --spring: cubic-bezier(.34, 1.35, .42, 1);
  }
  * { box-sizing: border-box; -webkit-user-select: none; }
  html, body { height: 100%; }
  body {
    margin: 0; padding: 12px; overflow: hidden; background: transparent;
    font: 14.5px/1.55 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    letter-spacing: .01em; color: var(--text);
  }
  .glass {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(44px) saturate(1.7);
    -webkit-backdrop-filter: blur(44px) saturate(1.7);
    box-shadow: 0 18px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.07);
  }
  .orb {
    width: 22px; height: 22px; border-radius: 50%; flex: none;
    background: var(--orb); filter: blur(.4px) saturate(1.3);
    box-shadow: 0 0 10px rgba(120,160,255,.45);
    animation: orb 7s linear infinite;
  }
  @keyframes orb { to { transform: rotate(360deg); } }
  .busy .orb { animation-duration: 1.6s; box-shadow: 0 0 16px rgba(120,160,255,.8); }

  /* ============ PILL (summon state) ============ */
  #pillView {
    display: flex; align-items: center; gap: 11px;
    height: 100%; padding: 0 10px 0 16px; border-radius: 34px;
    animation: appear .45s var(--spring) both;
  }
  @keyframes appear { from { opacity: 0; transform: scale(.92) translateY(-8px); } }
  #pillView .orb { cursor: grab; }
  #pillInput {
    flex: 1; border: none; outline: none; background: transparent;
    font: 17px -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    color: var(--text); -webkit-user-select: text;
  }
  #pillInput::placeholder { color: var(--dim); }

  .iconBtn {
    flex: none; width: 34px; height: 34px; border: none; border-radius: 50%;
    background: transparent; color: var(--dim); cursor: pointer;
    display: grid; place-items: center;
    transition: transform .18s var(--spring), color .2s, background .2s;
  }
  .iconBtn:hover { color: var(--text); background: var(--fill); transform: scale(1.08); }
  .iconBtn:active { transform: scale(.85); }
  .iconBtn svg { width: 16px; height: 16px; }

  /* ============ PANEL (conversation state) ============ */
  #panelView {
    display: none; flex-direction: column; height: 100%;
    border-radius: 28px; overflow: hidden;
  }
  #panelView.open { display: flex; animation: appear .4s var(--spring) both; }

  #head {
    flex: none; display: flex; align-items: center; gap: 8px;
    padding: 12px 14px 6px;
  }
  #head .spacer { flex: 1; }
  #head .ctl {
    width: 30px; height: 30px; border: none; border-radius: 50%;
    background: var(--fill); color: var(--dim); cursor: pointer;
    display: grid; place-items: center;
    transition: transform .18s var(--spring), background .2s, color .2s;
  }
  #head .ctl:hover { background: var(--fill-hover); color: var(--text); transform: scale(1.07); }
  #head .ctl:active { transform: scale(.85); }
  #head .ctl svg { width: 12px; height: 12px; }

  #log { flex: 1; overflow-y: auto; padding: 6px 20px 10px; }
  #log::-webkit-scrollbar { width: 7px; }
  #log::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,.22); border-radius: 4px;
    border: 2px solid transparent; background-clip: padding-box;
  }

  .row { display: flex; margin: 4px 0; animation: rise .42s var(--spring) both; }
  .row.user { justify-content: flex-end; }
  @keyframes rise { from { opacity: 0; transform: translateY(12px) scale(.97); } }

  .user .msg {
    max-width: 78%; padding: 8px 14px; border-radius: 18px;
    border-bottom-right-radius: 6px;
    background: var(--fill-hover); color: var(--text);
    white-space: pre-wrap; word-wrap: break-word; -webkit-user-select: text;
  }
  /* assistant: plain text on glass, like Siri */
  .bot .msg {
    max-width: 95%; padding: 4px 2px; font-size: 15px;
    word-wrap: break-word; -webkit-user-select: text;
  }
  .bot .msg p { margin: .45em 0; }
  .bot .msg p:first-child { margin-top: 0; }
  .bot .msg p:last-child { margin-bottom: 0; }
  .bot .msg h1, .bot .msg h2, .bot .msg h3 { margin: .65em 0 .25em; font-size: 1.03em; font-weight: 650; }
  .bot .msg ul, .bot .msg ol { margin: .3em 0; padding-left: 1.3em; }
  .bot .msg li { margin: .14em 0; }
  .bot .msg a { color: #6cb2ff; text-decoration: none; }
  .bot .msg a:hover { text-decoration: underline; }
  .bot .msg code {
    font: 12.5px ui-monospace, "SF Mono", Menlo, monospace;
    background: var(--fill); padding: 1.5px 5px; border-radius: 5px;
  }
  .bot .msg pre {
    background: rgba(0,0,0,.35); border: 1px solid var(--glass-border);
    border-radius: 12px; padding: 10px 12px; overflow-x: auto; margin: .5em 0;
  }
  .bot .msg pre code { background: none; padding: 0; }

  .tool {
    display: inline-flex; align-items: center; gap: 6px;
    margin: 4px 0; padding: 3.5px 11px;
    font-size: 11.5px; font-weight: 500; color: var(--dim);
    background: var(--fill); border-radius: 999px;
    animation: rise .38s var(--spring) both;
  }
  .tool .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: .35; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.15); } }

  .typing { display: inline-flex; gap: 5px; padding: 10px 2px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--dim);
    animation: blink 1.3s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: .18s; }
  .typing span:nth-child(3) { animation-delay: .36s; }
  @keyframes blink { 0%,70%,100% { opacity: .25; transform: translateY(0); } 35% { opacity: 1; transform: translateY(-3.5px); } }

  .err {
    width: fit-content; margin: 6px auto; padding: 4px 12px;
    font-size: 11.5px; color: #ff6961;
    background: rgba(255,69,58,.12); border: 1px solid rgba(255,69,58,.25);
    border-radius: 999px; animation: rise .38s var(--spring) both;
  }

  #bar { flex: none; display: flex; align-items: flex-end; gap: 9px; padding: 8px 14px 14px; }
  #screenBtn2 { background: var(--fill); color: var(--dim); width: 38px; height: 38px; }
  #inPill {
    flex: 1; display: flex; align-items: flex-end; gap: 6px;
    padding: 6px 6px 6px 15px; border-radius: 22px;
    background: var(--fill); border: 1px solid transparent;
    transition: border-color .25s, background .25s;
  }
  #inPill:focus-within { border-color: rgba(255,255,255,.25); background: var(--fill-hover); }
  #input {
    flex: 1; border: none; outline: none; resize: none;
    font: inherit; color: inherit; background: transparent;
    max-height: 120px; padding: 4px 0; -webkit-user-select: text;
  }
  #input::placeholder { color: var(--dim); }
  #sendBtn {
    flex: none; width: 30px; height: 30px; border: none; border-radius: 50%;
    background: #fff; color: #1d1d1f; cursor: pointer;
    display: grid; place-items: center;
    transition: transform .18s var(--spring), opacity .2s;
  }
  #sendBtn:hover { transform: scale(1.08); }
  #sendBtn:active { transform: scale(.86); }
  #sendBtn:disabled { opacity: .3; transform: none; cursor: default; }
  #sendBtn svg { width: 13px; height: 13px; }
</style>
</head>
<body>
  <!-- summon pill -->
  <div id="pillView" class="glass">
    <div class="orb pywebview-drag-region" title="Drag to move"></div>
    <input id="pillInput" placeholder="Ask Aide" autofocus>
    <button class="iconBtn" id="screenBtn1" title="Ask about what's on your screen">
      <svg viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2.5" width="13" height="9" rx="1.8"
        stroke="currentColor" stroke-width="1.6"/><path d="M5.5 14h5" stroke="currentColor"
        stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- conversation panel -->
  <div id="panelView" class="glass">
    <div id="head" class="pywebview-drag-region">
      <button class="ctl" id="closeBtn" title="Collapse (Esc)">
        <svg viewBox="0 0 12 12" fill="none"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor"
          stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="spacer"></div>
      <div class="orb"></div>
      <div class="spacer"></div>
      <button class="ctl" id="expandBtn" title="Expand">
        <svg viewBox="0 0 12 12" fill="none"><path d="M7 1h4v4M5 11H1V7M11 1L7.5 4.5M1 11l3.5-3.5"
          stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div id="log"></div>
    <div id="bar">
      <button class="iconBtn" id="screenBtn2" title="Ask about what's on your screen">
        <svg viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2.5" width="13" height="9" rx="1.8"
          stroke="currentColor" stroke-width="1.6"/><path d="M5.5 14h5" stroke="currentColor"
          stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
      <div id="inPill">
        <textarea id="input" rows="1" placeholder="Ask Aide"></textarea>
        <button id="sendBtn" title="Send">
          <svg viewBox="0 0 16 16" fill="none"><path d="M8 13V3M8 3L3.5 7.5M8 3l4.5 4.5"
            stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </div>

<script>
  const SIZES = { pill: [660, 92], panel: [660, 580], big: [860, 760] };
  let state = 'pill', expanded = false;
  const log = document.getElementById('log');
  const input = document.getElementById('input');
  const pillInput = document.getElementById('pillInput');
  const btn = document.getElementById('sendBtn');
  let botEl = null, botRaw = '', busy = false;

  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  function md(src) {
    const blocks = [];
    src = src.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `\x00${blocks.push(`<pre><code>${esc(code.replace(/\n$/,''))}</code></pre>`) - 1}\x00`);
    let html = esc(src)
      .replace(/`([^`\n]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
      .replace(/(^|\s)\*([^*\n]+)\*/g, '$1<i>$2</i>')
      .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2">$1</a>')
      .replace(/^###?#?\s+(.+)$/gm, '<h3>$1</h3>')
      .replace(/^(?:[-*]\s+.+\n?)+/gm, m =>
        `<ul>${m.trim().split('\n').map(l => `<li>${l.replace(/^[-*]\s+/, '')}</li>`).join('')}</ul>`)
      .replace(/^(?:\d+\.\s+.+\n?)+/gm, m =>
        `<ol>${m.trim().split('\n').map(l => `<li>${l.replace(/^\d+\.\s+/, '')}</li>`).join('')}</ol>`);
    html = html.split(/\n{2,}/).map(p =>
      /^<(h3|ul|ol|pre)/.test(p.trim()) ? p : `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
    return html.replace(/\x00(\d+)\x00/g, (_, i) => blocks[i]);
  }

  function setState(s) {
    state = s;
    const [w, h] = s === 'pill' ? SIZES.pill : (expanded ? SIZES.big : SIZES.panel);
    try { pywebview.api.resize(w, h); } catch (e) {}
    document.getElementById('pillView').style.display = s === 'pill' ? 'flex' : 'none';
    document.getElementById('panelView').classList.toggle('open', s === 'panel');
    (s === 'pill' ? pillInput : input).focus();
  }

  function scrollDown() { log.scrollTo({ top: log.scrollHeight, behavior: 'smooth' }); }
  function addRow(cls, inner) {
    const row = document.createElement('div');
    row.className = 'row ' + cls;
    row.appendChild(inner);
    log.appendChild(row); scrollDown();
    return inner;
  }
  function bubble(cls, text) {
    const el = document.createElement('div');
    el.className = 'msg';
    if (text !== undefined) el.textContent = text;
    return addRow(cls, el);
  }
  function clearTyping() { document.querySelectorAll('.typing-row').forEach(e => e.remove()); }
  function showTyping() {
    clearTyping();
    const t = document.createElement('div');
    t.className = 'msg typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    addRow('bot', t).parentElement.classList.add('typing-row');
  }
  function setBusy(b) {
    busy = b; btn.disabled = b;
    document.body.classList.toggle('busy', b);
    if (b) showTyping(); else clearTyping();
  }

  // ----- called from Python -----
  window.appendText = t => {
    if (state === 'pill') setState('panel');   // proactive output summons the panel
    clearTyping();
    if (!botEl) { botEl = bubble('bot'); botRaw = ''; }
    botRaw += (botRaw ? '\n\n' : '') + t;
    botEl.innerHTML = md(botRaw);
    scrollDown(); showTyping();
  };
  window.appendTool = name => {
    if (state === 'pill') setState('panel');
    clearTyping();
    const chip = document.createElement('div');
    chip.className = 'tool';
    chip.innerHTML = `<span class="pulse"></span>${esc(name.replace(/^mcp__\w+__/, ''))}`;
    log.appendChild(chip); scrollDown(); showTyping();
  };
  window.done = err => {
    clearTyping();
    if (err) {
      const e = document.createElement('div');
      e.className = 'err'; e.textContent = 'stopped: ' + err;
      log.appendChild(e); scrollDown();
    }
    botEl = null; botRaw = '';
    busy = false; btn.disabled = false;
    document.body.classList.remove('busy');
    if (state === 'panel') input.focus();
  };

  function submit(text) {
    if (!text || busy) return;
    if (state === 'pill') setState('panel');
    bubble('user', text);
    setBusy(true);
    pywebview.api.send(text);
  }
  function askScreen() {
    if (busy) return;
    if (state === 'pill') setState('panel');
    bubble('user', '👁 What’s on my screen?');
    setBusy(true);
    pywebview.api.send('Capture my screen and help me with what I am currently looking at. ' +
      'If it is obvious what I need, just do it; otherwise give a tight summary and offer next steps.');
  }

  btn.onclick = () => { const t = input.value.trim(); input.value = ''; input.style.height = 'auto'; submit(t); };
  document.getElementById('screenBtn1').onclick = askScreen;
  document.getElementById('screenBtn2').onclick = askScreen;
  document.getElementById('closeBtn').onclick = () => setState('pill');
  document.getElementById('expandBtn').onclick = () => { expanded = !expanded; setState('panel'); };

  pillInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); const t = pillInput.value.trim(); pillInput.value = ''; submit(t); }
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); btn.onclick(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto'; input.style.height = input.scrollHeight + 'px';
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && state === 'panel') setState('pill'); });

  window.addEventListener('pywebviewready', () => { setBusy(true); pywebview.api.greet(); });
</script>
</body>
</html>
