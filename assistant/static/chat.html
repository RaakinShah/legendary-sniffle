<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --side: #f5f5f7;
    --side-hover: rgba(0,0,0,0.05);
    --side-active: rgba(0,0,0,0.08);
    --hairline: rgba(0,0,0,0.09);
    --text: #1d1d1f;
    --dim: rgba(60,60,67,0.6);
    --faint: rgba(60,60,67,0.38);
    --fill: rgba(0,0,0,0.05);
    --fill-hover: rgba(0,0,0,0.09);
    --sel: rgba(10,132,255,0.16);
    --code-bg: rgba(0,0,0,0.05);
    --btn: #1d1d1f; --btn-fg: #fff;
    --link: #0a6dd6; --accent: #0a84ff;
    --orb: conic-gradient(from 200deg, #ff5fa2, #ffb45f, #5fd4ff, #a05fff, #ff5fa2);
    --spring: cubic-bezier(.34,1.35,.42,1);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e21; --side: #161618;
      --side-hover: rgba(255,255,255,0.06); --side-active: rgba(255,255,255,0.10);
      --hairline: rgba(255,255,255,0.10);
      --text: #f5f5f7; --dim: rgba(235,235,245,0.6); --faint: rgba(235,235,245,0.38);
      --fill: rgba(255,255,255,0.08); --fill-hover: rgba(255,255,255,0.14);
      --sel: rgba(10,132,255,0.32); --code-bg: rgba(255,255,255,0.08);
      --btn: #fff; --btn-fg: #111; --link: #6cb2ff;
    }
  }
  * { box-sizing: border-box; -webkit-user-select: none; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; background: var(--bg); color: var(--text); overflow: hidden;
    font: 14.5px/1.55 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    letter-spacing: .01em; -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--sel); }
  .orb {
    position: relative; width: 22px; height: 22px; border-radius: 50%; flex: none;
    background: radial-gradient(circle at 32% 28%, rgba(255,255,255,.95), rgba(255,255,255,0) 40%), var(--orb);
    animation: spin 7s linear infinite, glow 4.5s ease-in-out infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes glow { 0%,100%{box-shadow:0 0 8px rgba(150,140,255,.4)} 50%{box-shadow:0 0 16px rgba(120,160,255,.7)} }
  body.busy .orb { animation-duration: 1.3s, 1.3s; }

  /* ===== SIDEBAR ===== */
  #sidebar { display: flex; flex-direction: column; width: 244px; flex: none; height: 100vh;
    padding: 14px 10px 10px; background: var(--side); border-right: 1px solid var(--hairline); }
  .brand { display: flex; align-items: center; gap: 9px; padding: 4px 8px 14px; font-weight: 650; font-size: 16px; }
  .navItem { display: flex; align-items: center; gap: 10px; width: 100%; border: none; cursor: pointer;
    padding: 8px 10px; border-radius: 9px; background: transparent; color: var(--text);
    font: 13.5px -apple-system, sans-serif; text-align: left; transition: background .15s; margin-bottom: 1px; }
  .navItem:hover { background: var(--side-hover); }
  .navItem.active { background: var(--side-active); }
  .navItem svg { width: 15px; height: 15px; flex: none; opacity: .7; }
  #searchBox { display: none; margin: 2px 2px 6px; }
  #searchBox.show { display: block; animation: drop .25s ease both; }
  @keyframes drop { from { opacity: 0; transform: translateY(-5px); } }
  #searchBox input { width: 100%; border: 1px solid var(--hairline); outline: none; border-radius: 9px;
    padding: 7px 11px; font: 13px inherit; color: var(--text); background: var(--bg); }
  .sideHdr { font-size: 11px; font-weight: 600; color: var(--faint); text-transform: uppercase;
    letter-spacing: .04em; padding: 14px 10px 4px; }
  .convList { overflow-y: auto; }
  .convList::-webkit-scrollbar { width: 7px; }
  .convList::-webkit-scrollbar-thumb { background: var(--fill-hover); border-radius: 4px; border: 2px solid transparent; background-clip: padding-box; }
  #recents { flex: 1; }
  .conv { display: flex; align-items: center; gap: 6px; padding: 7px 10px; border-radius: 8px;
    cursor: pointer; font-size: 13px; transition: background .15s; animation: rise .3s ease both; }
  .conv:hover { background: var(--side-hover); } .conv.active { background: var(--side-active); }
  .conv .t { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conv .star { opacity: 0; color: var(--faint); transition: opacity .15s, color .15s; }
  .conv:hover .star { opacity: .55; } .conv .star.on { opacity: 1; color: #ffb000; }
  .sideFoot { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--hairline); }
  #ctxPill { display: flex; align-items: center; gap: 8px; width: 100%; border: 1px solid var(--hairline);
    cursor: pointer; padding: 7px 11px; border-radius: 10px; background: var(--bg); color: var(--dim);
    font: 12.5px inherit; margin-bottom: 8px; transition: background .15s; }
  #ctxPill:hover { background: var(--fill); }
  #ctxPill .dot { width: 7px; height: 7px; border-radius: 50%; background: #34c759; margin-left: auto; box-shadow: 0 0 6px #34c759; }
  #ctxPill.off { color: #ff9f0a; } #ctxPill.off .dot { background: #ff9f0a; box-shadow: none; }
  .user { display: flex; align-items: center; gap: 9px; padding: 6px 8px; }
  .user .av { width: 28px; height: 28px; border-radius: 50%; background: var(--btn); color: var(--btn-fg);
    display: grid; place-items: center; font-weight: 600; font-size: 12px; }
  .user .nm { font-size: 13px; } .user .sub { color: var(--faint); font-size: 11px; }

  /* ===== MAIN ===== */
  #main { display: flex; flex-direction: column; flex: 1; min-width: 0; height: 100vh; }
  #top { flex: none; display: flex; align-items: center; gap: 6px; padding: 12px 16px 4px; }
  #top .sp { flex: 1; }
  #top .ctl { width: 32px; height: 32px; border: none; border-radius: 8px; background: transparent;
    color: var(--dim); cursor: pointer; display: grid; place-items: center; transition: background .15s, color .15s; }
  #top .ctl:hover { background: var(--fill); color: var(--text); } #top .ctl svg { width: 16px; height: 16px; }
  #top .ctl.off { color: #ff9f0a; } #top .ctl.off .slash { display: inline !important; }

  #log { flex: 1; overflow-y: auto; padding: 10px 28px 16px;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 14px, #000 calc(100% - 10px), transparent 100%); }
  #log::-webkit-scrollbar { width: 8px; }
  #log::-webkit-scrollbar-thumb { background: var(--fill-hover); border-radius: 4px; border: 2px solid transparent; background-clip: padding-box; }
  #log.center { display: flex; flex-direction: column; justify-content: center; align-items: center; }
  #log.center > * { width: auto; }
  .hero { display: none; font-size: 27px; font-weight: 600; text-align: center; margin: 0 0 24px;
    letter-spacing: -.01em; animation: rise .5s var(--spring) both; }
  #log.center .hero { display: block; }
  .wrap { width: 100%; max-width: 720px; margin: 0 auto; }

  .row { display: flex; margin: 8px 0; animation: rise .5s var(--spring) both; }
  .row.u { justify-content: flex-end; }
  @keyframes rise { from { opacity: 0; transform: translateY(14px) scale(.97); } }
  .u .msg { max-width: 80%; padding: 9px 15px; border-radius: 19px; border-bottom-right-radius: 6px;
    background: var(--fill); border: 1px solid var(--hairline); white-space: pre-wrap; word-wrap: break-word; -webkit-user-select: text; }
  .b .msg { max-width: 100%; padding: 4px 2px; font-size: 15px; line-height: 1.6; word-wrap: break-word; -webkit-user-select: text; }
  .b .msg p { margin: .45em 0; } .b .msg p:first-child { margin-top: 0; } .b .msg p:last-child { margin-bottom: 0; }
  .b .msg h1,.b .msg h2,.b .msg h3 { margin: .65em 0 .25em; font-size: 1.03em; font-weight: 650; }
  .b .msg ul,.b .msg ol { margin: .3em 0; padding-left: 1.3em; } .b .msg li { margin: .14em 0; }
  .b .msg a { color: var(--link); text-decoration: none; } .b .msg a:hover { text-decoration: underline; }
  .b .msg code { font: 12.5px ui-monospace, "SF Mono", Menlo, monospace; background: var(--code-bg); padding: 1.5px 5px; border-radius: 5px; }
  .b .msg pre { background: var(--code-bg); border: 1px solid var(--hairline); border-radius: 12px; padding: 10px 12px; overflow-x: auto; margin: .5em 0; }
  .b .msg pre code { background: none; padding: 0; }
  .draft { opacity: .92; }
  .draft::after { content: ''; display: inline-block; width: 7px; height: 14px; margin-left: 2px; vertical-align: -2px;
    border-radius: 2px; background: var(--dim); animation: caret 1s steps(2) infinite; }
  @keyframes caret { 50% { opacity: 0; } }
  .row.b { position: relative; }
  .copyBtn { position: absolute; top: 2px; right: 0; width: 26px; height: 26px; border: none; border-radius: 8px;
    cursor: pointer; background: var(--fill); color: var(--dim); display: grid; place-items: center; opacity: 0; transition: opacity .2s, background .2s; }
  .row.b:hover .copyBtn { opacity: 1; } .copyBtn:hover { background: var(--fill-hover); color: var(--text); } .copyBtn svg { width: 12px; height: 12px; }

  #chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 4px 0; animation: rise .5s var(--spring) both; }
  .chip { cursor: pointer; padding: 9px 16px; border-radius: 999px; font: 13px -apple-system, sans-serif; font-weight: 500;
    color: var(--text); background: var(--fill); border: 1px solid var(--hairline); transition: transform .18s var(--spring), background .2s; }
  .chip:hover { background: var(--fill-hover); transform: translateY(-1px) scale(1.04); }
  .chip:active { transform: scale(.93); }

  .tool { display: inline-flex; align-items: center; gap: 6px; width: fit-content; align-self: flex-start;
    margin: 4px 0; padding: 3.5px 11px; font-size: 11.5px; font-weight: 500; color: var(--dim);
    background: var(--fill); border-radius: 999px; animation: slideIn .42s var(--spring) both; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-12px); } }
  .tool .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.35;transform:scale(.8)} 50%{opacity:1;transform:scale(1.15)} }
  .typing { display: inline-flex; gap: 5px; padding: 10px 2px; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); animation: blink 1.3s ease-in-out infinite; }
  .typing span:nth-child(2){animation-delay:.18s} .typing span:nth-child(3){animation-delay:.36s}
  @keyframes blink { 0%,70%,100%{opacity:.25;transform:translateY(0)} 35%{opacity:1;transform:translateY(-3.5px)} }
  .err { width: fit-content; margin: 6px auto; padding: 4px 12px; font-size: 11.5px; color: #ff453a;
    background: rgba(255,69,58,.12); border: 1px solid rgba(255,69,58,.25); border-radius: 999px; animation: rise .38s var(--spring) both; }

  #bar { flex: none; padding: 8px 28px 20px; }
  #barWrap { display: flex; align-items: flex-end; gap: 9px; width: 100%; max-width: 720px; margin: 0 auto; }
  #screenBtn { flex: none; width: 38px; height: 38px; border: none; border-radius: 50%; background: var(--fill);
    color: var(--dim); cursor: pointer; display: grid; place-items: center; transition: background .2s, color .2s, transform .18s var(--spring); }
  #screenBtn:hover { background: var(--fill-hover); color: var(--text); transform: scale(1.06); } #screenBtn svg { width: 17px; height: 17px; }
  #inPill { flex: 1; display: flex; align-items: flex-end; gap: 6px; padding: 7px 7px 7px 16px; border-radius: 22px;
    background: var(--fill); border: 1px solid var(--hairline); transition: border-color .2s, box-shadow .2s; }
  #inPill:focus-within { border-color: rgba(10,132,255,.5); box-shadow: 0 0 0 3px rgba(10,132,255,.15); }
  #input { flex: 1; border: none; outline: none; resize: none; font: 15px inherit; color: inherit; background: transparent;
    max-height: 160px; padding: 5px 0; -webkit-user-select: text; }
  #input::placeholder { color: var(--dim); }
  #sendBtn { flex: none; width: 32px; height: 32px; border: none; border-radius: 50%; background: var(--btn); color: var(--btn-fg);
    cursor: pointer; display: grid; place-items: center; transition: transform .18s var(--spring), opacity .2s; }
  #sendBtn:hover { transform: scale(1.08); } #sendBtn:active { transform: scale(.86); }
  #sendBtn.ready { box-shadow: 0 0 0 3px rgba(10,132,255,.25); }
  #sendBtn:disabled { opacity: .3; transform: none; cursor: default; } #sendBtn svg { width: 14px; height: 14px; }
</style>
</head>
<body>
  <div id="sidebar">
    <div class="brand"><div class="orb"></div>Aide</div>
    <button class="navItem active" id="navNew">
      <svg viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>New Chat</button>
    <button class="navItem" id="navSearch">
      <svg viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.6"/><path d="M11 11l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>Search</button>
    <div id="searchBox"><input id="searchInput" placeholder="Search conversations…"></div>
    <button class="navItem" id="navRoutines">
      <svg viewBox="0 0 16 16" fill="none"><path d="M13 8a5 5 0 1 1-1.5-3.5M13 2v3h-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Routines</button>
    <div class="sideHdr" id="favHdr" style="display:none">Favorites</div>
    <div class="convList" id="favorites"></div>
    <div class="sideHdr">Recents</div>
    <div class="convList" id="recents"></div>
    <div class="sideFoot">
      <button id="ctxPill"><span>Context active</span><span class="dot"></span></button>
      <div class="user"><div class="av">A</div><div><div class="nm">You</div><div class="sub">Aide · local</div></div></div>
    </div>
  </div>

  <div id="main">
    <div id="top">
      <div class="sp"></div>
      <button class="ctl" id="recallBtn" title="Pause ambient memory">
        <svg viewBox="0 0 16 16" fill="none"><path d="M1.5 8s2.5-4 6.5-4 6.5 4 6.5 4-2.5 4-6.5 4-6.5-4-6.5-4Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><circle cx="8" cy="8" r="1.9" stroke="currentColor" stroke-width="1.4"/><path class="slash" d="M3 13.5L13 2.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" style="display:none"/></svg></button>
      <button class="ctl" id="newBtn2" title="New conversation">
        <svg viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></button>
    </div>
    <div id="log"></div>
    <div id="bar">
      <div id="barWrap">
        <button id="screenBtn" title="Ask about what's on your screen">
          <svg viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2.5" width="13" height="9" rx="1.8" stroke="currentColor" stroke-width="1.6"/><path d="M5.5 14h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
        <div id="inPill">
          <textarea id="input" rows="1" placeholder="Ask Aide" autofocus></textarea>
          <button id="sendBtn" title="Send"><svg viewBox="0 0 16 16" fill="none"><path d="M8 13V3M8 3L3.5 7.5M8 3l4.5 4.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </div>
      </div>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  const log = $('log'), input = $('input'), btn = $('sendBtn');
  let botEl = null, botRaw = '', busy = false, draftEl = null, draftText = '';

  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  function md(src) {
    const blocks = [];
    src = src.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, c) => `\x00${blocks.push(`<pre><code>${esc(c.replace(/\n$/,''))}</code></pre>`)-1}\x00`);
    let h = esc(src).replace(/`([^`\n]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>')
      .replace(/(^|\s)\*([^*\n]+)\*/g,'$1<i>$2</i>').replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2">$1</a>')
      .replace(/^###?#?\s+(.+)$/gm,'<h3>$1</h3>')
      .replace(/^(?:[-*]\s+.+\n?)+/gm, m => `<ul>${m.trim().split('\n').map(l=>`<li>${l.replace(/^[-*]\s+/,'')}</li>`).join('')}</ul>`)
      .replace(/^(?:\d+\.\s+.+\n?)+/gm, m => `<ol>${m.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\.\s+/,'')}</li>`).join('')}</ol>`);
    h = h.split(/\n{2,}/).map(p => /^<(h3|ul|ol|pre)/.test(p.trim()) ? p : `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
    return h.replace(/\x00(\d+)\x00/g, (_, i) => blocks[i]);
  }

  function scrollDown() { updateCenter(); log.scrollTo({ top: log.scrollHeight, behavior: 'smooth' }); }
  function updateCenter() {
    const rows = log.querySelectorAll('.row:not(.typing-row)').length;
    const content = Array.from(log.children).reduce((a,c)=>a+c.offsetHeight,0);
    log.classList.toggle('center', !log.querySelector('.row.u') && rows <= 1 && content <= log.clientHeight * 0.6);
  }
  function addRow(cls, inner) { const w = document.createElement('div'); w.className = 'wrap'; const r = document.createElement('div'); r.className = 'row ' + cls; r.appendChild(inner); w.appendChild(r); log.appendChild(w); scrollDown(); return inner; }
  function bubble(cls, text) { const e = document.createElement('div'); e.className = 'msg'; if (text !== undefined) e.textContent = text; return addRow(cls, e); }
  function clearTyping() { document.querySelectorAll('.typing-row').forEach(e => e.closest('.wrap').remove()); }
  function showTyping() { clearTyping(); const t = document.createElement('div'); t.className = 'msg typing'; t.innerHTML = '<span></span><span></span><span></span>'; addRow('b typing-row', t); }
  function setBusy(b) { busy = b; btn.disabled = b; document.body.classList.toggle('busy', b); if (b) showTyping(); else clearTyping(); }

  const TOOL_NAMES = { Bash:'Running a command', Read:'Reading a file', Write:'Writing a file', Edit:'Editing a file',
    Glob:'Finding files', Grep:'Searching files', WebSearch:'Searching the web', WebFetch:'Reading a webpage', TodoWrite:'Planning',
    capture_screen:'Looking at your screen', add_task:'Adding a task', list_tasks:'Checking your tasks', due_tasks:'Checking what’s due',
    complete_task:'Completing a task', remember:'Saving to memory', journal:'Updating journal', recall_timeline:'Checking your activity',
    recall_screenshot:'Looking back in time', recall_search:'Searching your screen memory', recall_pause:'Pausing ambient memory', recall_forget:'Forgetting' };
  const toolLabel = n => TOOL_NAMES[n] || n.replace(/_/g,' ').replace(/([a-z])([A-Z])/g,'$1 $2');
  const COPY_SVG = '<svg viewBox="0 0 12 12" fill="none"><rect x="3.5" y="3.5" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M8.5 3.5V2.3A1.3 1.3 0 0 0 7.2 1H2.3A1.3 1.3 0 0 0 1 2.3v4.9a1.3 1.3 0 0 0 1.3 1.3h1.2" stroke="currentColor" stroke-width="1.4"/></svg>';

  function ensureBot() {
    if (!botEl) {
      botEl = bubble('b'); botRaw = '';
      const c = document.createElement('button'); c.className = 'copyBtn'; c.title = 'Copy'; c.innerHTML = COPY_SVG;
      const el = botEl; c.onclick = () => navigator.clipboard && navigator.clipboard.writeText(el._raw || el.textContent);
      botEl.parentElement.appendChild(c);
    }
    return botEl;
  }
  function clearDraft() { if (draftEl) draftEl.remove(); draftEl = null; draftText = ''; }
  function showChips() {
    const wrap = document.createElement('div'); wrap.className = 'wrap';
    const hero = document.createElement('div'); hero.className = 'hero'; hero.textContent = "What's on your mind today?"; wrap.appendChild(hero);
    const chips = document.createElement('div'); chips.id = 'chips';
    [['What’s on my screen','__SCREEN__'],['Plan my day','Plan my day: check my tasks and calendar and lay out a plan.'],
     ['What’s due','What tasks are due or overdue?'],['Check my email','Check my recent email and summarize anything that needs my attention.']]
    .forEach(([label, prompt], i) => { const b = document.createElement('button'); b.className = 'chip'; b.textContent = label;
      b.style.animation = `rise .45s var(--spring) ${.1+i*.06}s both`;
      b.onclick = () => prompt === '__SCREEN__' ? askScreen() : submit(prompt); chips.appendChild(b); });
    wrap.appendChild(chips); log.appendChild(wrap); updateCenter();
  }

  // ----- from Python -----
  window.streamText = t => { clearTyping(); const el = ensureBot(); if (!draftEl) { draftEl = document.createElement('div'); draftEl.className = 'draft'; el.appendChild(draftEl); } draftText += t; draftEl.textContent = draftText; scrollDown(); };
  window.appendText = t => { clearTyping(); clearDraft(); const el = ensureBot(); botRaw += (botRaw?'\n\n':'') + t; el.innerHTML = md(botRaw); el._raw = botRaw; scrollDown(); showTyping(); };
  window.appendTool = name => { clearTyping(); clearDraft(); const c = document.createElement('div'); c.className = 'tool'; c.innerHTML = `<span class="pulse"></span>${esc(toolLabel(name.replace(/^mcp__\w+__/,'')))}`; addRow('b', c); scrollDown(); showTyping(); };
  window.done = err => {
    clearTyping(); clearDraft();
    if (err) { const e = document.createElement('div'); e.className = 'err'; e.textContent = 'stopped: ' + err; const w = document.createElement('div'); w.className='wrap'; w.appendChild(e); log.appendChild(w); scrollDown(); }
    document.querySelectorAll('.tool .pulse').forEach(p => p.remove());
    botEl = null; botRaw = ''; setBusy(false); refreshLists(); input.focus();
  };
  window.focusInput = () => input.focus();

  function submit(text) {
    if (!text || busy) return;
    log.querySelectorAll('.wrap').forEach(w => { if (w.querySelector('#chips') || w.querySelector('.hero')) w.remove(); });
    bubble('u', text); setBusy(true); pywebview.api.send(text);
  }
  function askScreen() {
    if (busy) return;
    log.querySelectorAll('.wrap').forEach(w => { if (w.querySelector('#chips') || w.querySelector('.hero')) w.remove(); });
    bubble('u', '👁 What’s on my screen?'); setBusy(true);
    pywebview.api.send('Capture my screen and help me with what I am currently looking at. If it is obvious what I need, just do it; otherwise summarize and offer next steps.');
  }

  // ----- conversations / sidebar -----
  function freshLog() { log.innerHTML = ''; botEl = null; botRaw = ''; clearDraft(); }
  function startNew() { if (busy) return; freshLog(); pywebview.api.new_chat(); showChips(); refreshLists(); input.focus(); document.querySelectorAll('.conv.active').forEach(c => c.classList.remove('active')); }
  async function openConv(id, el) {
    if (busy) return;
    let d; try { d = await pywebview.api.open_conversation(id); } catch (e) { return; }
    if (!d || !d.messages) return;
    freshLog();
    for (const m of d.messages) {
      if (m.role === 'user') bubble('u', m.text);
      else { const b = bubble('b'); b.innerHTML = md(m.text); b._raw = m.text;
        const c = document.createElement('button'); c.className = 'copyBtn'; c.innerHTML = COPY_SVG; c.onclick = () => navigator.clipboard && navigator.clipboard.writeText(m.text); b.parentElement.appendChild(c); }
    }
    botEl = null; updateCenter(); scrollDown(); input.focus();
    document.querySelectorAll('.conv.active').forEach(c => c.classList.remove('active')); if (el) el.classList.add('active');
  }
  function convRow(c) {
    const r = document.createElement('div'); r.className = 'conv'; r.dataset.id = c.id;
    const t = document.createElement('span'); t.className = 't'; t.textContent = c.title || 'New chat';
    const s = document.createElement('span'); s.className = 'star' + (c.favorite ? ' on' : ''); s.textContent = '★';
    s.onclick = e => { e.stopPropagation(); pywebview.api.favorite_conversation(c.id, !c.favorite).then(refreshLists); };
    r.append(t, s); r.onclick = () => openConv(c.id, r); return r;
  }
  function render(el, items) { el.innerHTML = ''; items.forEach(c => el.appendChild(convRow(c))); }
  async function refreshLists() {
    try { const { recents, favorites } = await pywebview.api.list_conversations();
      $('favHdr').style.display = favorites.length ? 'block' : 'none';
      render($('favorites'), favorites); render($('recents'), recents);
    } catch (e) {}
  }

  // ----- wiring -----
  btn.onclick = () => { const t = input.value.trim(); input.value = ''; input.style.height = 'auto'; btn.classList.remove('ready'); submit(t); };
  $('screenBtn').onclick = askScreen;
  $('navNew').onclick = startNew; $('newBtn2').onclick = startNew;
  $('navSearch').onclick = () => { const sb = $('searchBox'); sb.classList.toggle('show'); if (sb.classList.contains('show')) $('searchInput').focus(); };
  $('navRoutines').onclick = () => submit('Show me my latest briefing and evening digest if they exist; otherwise lay out a quick plan for today.');
  $('searchInput').addEventListener('input', async e => {
    const q = e.target.value.trim();
    try { render($('recents'), await pywebview.api.search_conversations(q)); $('favHdr').style.display = 'none'; $('favorites').innerHTML = ''; } catch (err) {}
  });
  async function toggleRecall() {
    try { const off = await pywebview.api.toggle_recall();
      $('recallBtn').classList.toggle('off', off);
      const cp = $('ctxPill'); cp.classList.toggle('off', off); cp.firstChild.textContent = off ? 'Context paused' : 'Context active';
    } catch (e) {}
  }
  $('recallBtn').onclick = toggleRecall; $('ctxPill').onclick = toggleRecall;
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); btn.onclick(); } });
  input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = input.scrollHeight + 'px'; btn.classList.toggle('ready', !!input.value.trim() && !busy); });

  window.addEventListener('pywebviewready', () => { showChips(); refreshLists(); setBusy(true); pywebview.api.greet(); });
</script>
</body>
</html>
