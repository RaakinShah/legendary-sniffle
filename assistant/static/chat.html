<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    color-scheme: light dark;
    --bg: rgba(246, 246, 248, 0.72);
    --panel: rgba(255, 255, 255, 0.62);
    --panel-border: rgba(0, 0, 0, 0.07);
    --text: #1d1d1f;
    --text-dim: rgba(60, 60, 67, 0.55);
    --accent: #0a84ff;
    --accent-grad: linear-gradient(150deg, #3ea2ff 0%, #0a84ff 55%, #0066d6 100%);
    --bubble-shadow: 0 1px 2px rgba(0,0,0,.06), 0 4px 14px rgba(10,132,255,.18);
    --hairline: rgba(0, 0, 0, 0.08);
    --spring: cubic-bezier(.34, 1.4, .44, 1);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: rgba(28, 28, 30, 0.62);
      --panel: rgba(60, 60, 64, 0.55);
      --panel-border: rgba(255, 255, 255, 0.09);
      --text: #f5f5f7;
      --text-dim: rgba(235, 235, 245, 0.55);
      --bubble-shadow: 0 1px 2px rgba(0,0,0,.25), 0 4px 16px rgba(10,132,255,.22);
      --hairline: rgba(255, 255, 255, 0.10);
    }
  }
  * { box-sizing: border-box; -webkit-user-select: none; }
  html, body { height: 100%; }
  body {
    margin: 0; display: flex; flex-direction: column;
    font: 14px/1.55 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    letter-spacing: .01em;
    background: var(--bg);            /* translucent — vibrancy shows through */
    color: var(--text);
    overflow: hidden;
  }

  /* ----- message log ----- */
  #log {
    flex: 1; overflow-y: auto; padding: 18px 16px 10px;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 14px);
  }
  #log::-webkit-scrollbar { width: 8px; }
  #log::-webkit-scrollbar-thumb {
    background: rgba(128,128,128,.35); border-radius: 4px;
    border: 2px solid transparent; background-clip: padding-box;
  }
  #log::-webkit-scrollbar-thumb:hover { background: rgba(128,128,128,.55); background-clip: padding-box; }

  .row { display: flex; margin: 3px 0; animation: rise .42s var(--spring) both; }
  .row.user { justify-content: flex-end; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(12px) scale(.96); }
    to   { opacity: 1; transform: none; }
  }

  .msg {
    max-width: 82%; padding: 9px 14px; border-radius: 18px;
    word-wrap: break-word; -webkit-user-select: text;
  }
  .user .msg {
    background: var(--accent-grad); color: #fff;
    border-bottom-right-radius: 5px;
    box-shadow: var(--bubble-shadow);
    white-space: pre-wrap;
  }
  .bot .msg {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-bottom-left-radius: 5px;
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }

  /* markdown inside assistant bubbles */
  .bot .msg p { margin: .35em 0; }
  .bot .msg p:first-child { margin-top: 0; }
  .bot .msg p:last-child { margin-bottom: 0; }
  .bot .msg h1, .bot .msg h2, .bot .msg h3 { margin: .6em 0 .25em; font-size: 1.02em; font-weight: 650; }
  .bot .msg ul, .bot .msg ol { margin: .3em 0; padding-left: 1.3em; }
  .bot .msg li { margin: .12em 0; }
  .bot .msg a { color: var(--accent); text-decoration: none; }
  .bot .msg a:hover { text-decoration: underline; }
  .bot .msg code {
    font: 12px ui-monospace, "SF Mono", Menlo, monospace;
    background: rgba(128,128,128,.16); padding: 1.5px 5px; border-radius: 5px;
  }
  .bot .msg pre {
    background: rgba(128,128,128,.13); border: 1px solid var(--panel-border);
    border-radius: 10px; padding: 10px 12px; overflow-x: auto; margin: .45em 0;
  }
  .bot .msg pre code { background: none; padding: 0; }

  /* tool activity chip */
  .tool {
    display: inline-flex; align-items: center; gap: 6px;
    margin: 4px 0 4px 4px; padding: 3.5px 11px;
    font-size: 11.5px; font-weight: 500; color: var(--text-dim);
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 999px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    animation: rise .38s var(--spring) both;
  }
  .tool .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: .35; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.15); } }

  /* typing indicator */
  .typing { display: inline-flex; gap: 5px; padding: 13px 16px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim);
    animation: blink 1.3s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: .18s; }
  .typing span:nth-child(3) { animation-delay: .36s; }
  @keyframes blink { 0%,70%,100% { opacity: .25; transform: translateY(0); } 35% { opacity: 1; transform: translateY(-3.5px); } }

  .err {
    align-self: center; margin: 6px auto; padding: 4px 12px;
    font-size: 11.5px; color: #ff453a;
    background: rgba(255,69,58,.10); border: 1px solid rgba(255,69,58,.22);
    border-radius: 999px; animation: rise .38s var(--spring) both;
  }

  /* ----- input bar ----- */
  #bar { padding: 10px 14px 14px; }
  #pill {
    display: flex; align-items: flex-end; gap: 8px;
    padding: 7px 7px 7px 16px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 24px;
    backdrop-filter: blur(24px) saturate(1.5);
    -webkit-backdrop-filter: blur(24px) saturate(1.5);
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    transition: border-color .25s ease, box-shadow .25s ease;
  }
  #pill:focus-within {
    border-color: rgba(10,132,255,.55);
    box-shadow: 0 0 0 3.5px rgba(10,132,255,.16), 0 1px 4px rgba(0,0,0,.06);
  }
  #input {
    flex: 1; border: none; outline: none; resize: none;
    font: inherit; color: inherit; background: transparent;
    max-height: 130px; padding: 4px 0; -webkit-user-select: text;
  }
  #input::placeholder { color: var(--text-dim); }
  #sendBtn {
    flex: none; width: 32px; height: 32px; border: none; border-radius: 50%;
    background: var(--accent-grad); color: #fff; cursor: pointer;
    display: grid; place-items: center;
    box-shadow: 0 2px 8px rgba(10,132,255,.35);
    transition: transform .18s var(--spring), opacity .2s ease, box-shadow .2s ease;
  }
  #sendBtn:hover { transform: scale(1.07); box-shadow: 0 3px 12px rgba(10,132,255,.45); }
  #sendBtn:active { transform: scale(.88); }
  #sendBtn:disabled { opacity: .35; transform: none; box-shadow: none; cursor: default; }
  #sendBtn svg { width: 14px; height: 14px; }
</style>
</head>
<body>
  <div id="log"></div>
  <div id="bar">
    <div id="pill">
      <textarea id="input" rows="1" placeholder="Message…" autofocus></textarea>
      <button id="sendBtn" title="Send">
        <svg viewBox="0 0 16 16" fill="none"><path d="M8 13V3M8 3L3.5 7.5M8 3l4.5 4.5"
          stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>
<script>
  const log = document.getElementById('log');
  const input = document.getElementById('input');
  const btn = document.getElementById('sendBtn');
  let botEl = null, botRaw = '', busy = false;

  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // compact markdown renderer: code blocks, inline code, bold/italic, links, headings, lists
  function md(src) {
    const blocks = [];
    src = src.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `\x00${blocks.push(`<pre><code>${esc(code.replace(/\n$/,''))}</code></pre>`) - 1}\x00`);
    let html = esc(src)
      .replace(/`([^`\n]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
      .replace(/(^|\s)\*([^*\n]+)\*/g, '$1<i>$2</i>')
      .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2">$1</a>')
      .replace(/^###?#?\s+(.+)$/gm, '<h3>$1</h3>')
      .replace(/^(?:[-*]\s+.+\n?)+/gm, m =>
        `<ul>${m.trim().split('\n').map(l => `<li>${l.replace(/^[-*]\s+/, '')}</li>`).join('')}</ul>`)
      .replace(/^(?:\d+\.\s+.+\n?)+/gm, m =>
        `<ol>${m.trim().split('\n').map(l => `<li>${l.replace(/^\d+\.\s+/, '')}</li>`).join('')}</ol>`);
    html = html.split(/\n{2,}/).map(p =>
      /^<(h3|ul|ol|pre)/.test(p.trim()) ? p : `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
    return html.replace(/\x00(\d+)\x00/g, (_, i) => blocks[i]);
  }

  function scrollDown() { log.scrollTo({ top: log.scrollHeight, behavior: 'smooth' }); }

  function addRow(cls, inner) {
    const row = document.createElement('div');
    row.className = 'row ' + cls;
    row.appendChild(inner);
    log.appendChild(row);
    scrollDown();
    return inner;
  }
  function bubble(cls, text) {
    const el = document.createElement('div');
    el.className = 'msg';
    if (text !== undefined) el.textContent = text;
    return addRow(cls, el);
  }
  function clearTyping() { document.querySelectorAll('.typing-row').forEach(e => e.remove()); }
  function showTyping() {
    clearTyping();
    const t = document.createElement('div');
    t.className = 'msg typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    const row = addRow('bot', t).parentElement;
    row.classList.add('typing-row');
  }
  function setBusy(b) { busy = b; btn.disabled = b; if (b) showTyping(); else clearTyping(); }

  // ----- called from Python -----
  window.appendText = t => {
    clearTyping();
    if (!botEl) { botEl = bubble('bot'); botRaw = ''; }
    botRaw += (botRaw ? '\n\n' : '') + t;
    botEl.innerHTML = md(botRaw);
    scrollDown();
    showTyping();           // still working until done() fires
  };
  window.appendTool = name => {
    clearTyping();
    const chip = document.createElement('div');
    chip.className = 'tool';
    chip.innerHTML = `<span class="pulse"></span>${esc(name.replace(/^mcp__\w+__/, ''))}`;
    log.appendChild(chip);
    scrollDown();
    showTyping();
  };
  window.done = err => {
    clearTyping();
    if (err) {
      const e = document.createElement('div');
      e.className = 'err'; e.textContent = 'stopped: ' + err;
      log.appendChild(e); scrollDown();
    }
    botEl = null; botRaw = '';
    busy = false; btn.disabled = false;
    input.focus();
  };

  function send() {
    const text = input.value.trim();
    if (!text || busy) return;
    bubble('user', text);
    input.value = ''; input.style.height = 'auto';
    setBusy(true);
    pywebview.api.send(text);
  }
  btn.onclick = send;
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto'; input.style.height = input.scrollHeight + 'px';
  });
  window.addEventListener('pywebviewready', () => { setBusy(true); pywebview.api.greet(); });
</script>
</body>
</html>
